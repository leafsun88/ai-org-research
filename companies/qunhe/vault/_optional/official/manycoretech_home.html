台上线，涵盖空间重建、空间生成、空间编辑与空间理解方面的能力。群核科技联合创始人兼CEO（首席执行官）陈航表示：“当AI（人工智能）加速迈向三维世界，行业最需要的是底层技术的‘卖水人’。”","Tr-16fda2":"面向工业具身智能规模化落地，群核科技推出云原生工业AI孪生平台SpatialTwin","Tr-099f41":"11月6日，群核科技在2025世界互联网大会上，正式推出专为工业具身智能打造的云原生工业AI孪生平台——SpatialTwin。与此同时，SpatialTwin入选2025年世界互联网大会“互联网之光”博览会十大首发成果。","Tr-eec8a5":"LuxReal是群核科技基于3D技术所打造的AI内容创作工具。","Tr-e6285a":"LuxReal以群核自研的空间生成模型为底座，可以在保证时空一致性的前提下，快速地生成高度可控且富有创意的视频内容，使AI视频创作实现稳定性和灵活性的高度统一。","Tr-c01dc9":"SpatialVerse 的最终目标，是通过合成数据生成、工业数字孪生与持续仿真技术，为具身智能、AIGC、XR等前沿领域的智能体提供无限、合规、高质量的“虚拟训练场”，从而系统性应对AI在物理现实中所面临的数据稀缺、试错成本高昂等核心挑战。","Tr-dac641":"Aholo平台","Tr-13874e":"应届生招聘","Tr-199153":"Aholo空间智能开放平台，整合了群核科技从大模型、数据到工具的核心3D能力 ，面向千行百业开放包括空间重建、空间生成、空间编辑、空间理解等底层能力。用户可通过标准化 API 与 SDK 的形式调用模型层或工具层使用。","Tr-05711a":"无论是在3D空间创作、XR、影视短剧、文化遗产保护，还是工业孪生、机器人仿真等领域，Aholo 都是赋能空间智能创新的底座与引擎，让AI具备「理解空间、生成空间、推理空间」的能力。","Tr-d9c4e4":"空间重建","Tr-8da574":"借助 3D 高斯技术，可以使用智能手机等轻便设备将现实世界的空间快速重建为可计算的空间数据。","Tr-840b1b":"空间生成","Tr-472d03":"基于空间生成模型SpatialGen，用户通过一张照片，即可将2D图片还原为时空一致的3D可漫游空间 ，创造无限空间场景。","Tr-26c9f9":"空间编辑","Tr-90ded1":"凭借实时混合渲染技术，用户基于还原的真实场景上，可将外部模型无缝融入，能实现照片级的虚实融合效果，使其真正成为创作流程中的可用资产。","Tr-457535":"空间理解","Tr-fef6e6":"基于空间语言模型SpatialLM，能精准识别场景中的物体、结构与空间关系，支持自然语言指令交互，让 AI读懂空间逻辑。","Tr-2a2a79":"外国博主Zein用Aholo还原时思寺","Tr-b3df70":"外国博主Zein，是一位《黑神话·悟空》的爱好者，也是Aholo的首位用户。今年12月，他用Aholo还原了《黑神话·悟空》的取景地——丽水时思寺，通过两小时的现场数据采集，顺利把时思寺的一草一木，一砖一瓦，全都1:1精准还原！他让全世界的粉丝朋友们，都能通过一条链接“走进”中国的千年文化。","Tr-df2678":"华策牵手群核，探索虚拟片场创作","Tr-f5fec7":"国内影视行业龙头企业华策影视与群核科技达成战略合作，共同推进空间智能技术在影视内容创作与制作领域的前沿应用与深度融合。华策将借助群核科技Aholo平台，围绕虚拟片场生成与影视场景重建以及产业生态协同共建等方向展开深度合作，以提升影视制作效率与艺术表现力，并推动影视行业向智能化、数字化方向转型升级。","Tr-e57825":"PICO牵手群核，打造“空间智能+XR”生态","Tr-d319af":"XR平台PICO与群核科技正式达成生态合作，双方基于PICO的XR硬件系统与群核科技平台丰富的空间数据集，希望未来携手打造“世界最大的可交互XR资产库”，为全球开发者与企业用户提供XR内容生产基座，并探索开放共赢的 “空间智能 + XR” 创新生态。","Tr-663d5a":"空间智能应用生态","Tr-2e86b6":"空间智能","Tr-f218b4":"应用生态","Tr-f19292":"链接全产业生态伙伴，携手赋能AI进入物理世界","Tr-0e007f":"LuxReal 上线","Tr-77a4d5":"推出3D AI 内容创作工具LuxReal，其生成视频可在时空维度上保持高度一致性。","Tr-9dc0de":"Aholo 上线","Tr-fb8e88":"面向空间智能领域打造的开放平台，整合空间重建 :"//qhstaticssl.kujiale.com/image/png/1758091237487/F94AE234618956246418E82491DE20B2.png","title":"Tr-b2a51a","desc":"Tr-392d4a"},{"key":3,"imgSrc":"//qhstaticssl.kujiale.com/image/png/1757670443903/402E0A4D7E9CB751FBCB859F2D915094.png","mobileImgSrc":"//qhstaticssl.kujiale.com/image/png/1757670443903/402E0A4D7E9CB751FBCB859F2D915094.png","title":"Tr-4693c6","desc":"Tr-1e364f"}],"openSourceModels":[{"key":0,"imgSrc":"//qhstaticssl.kujiale.com/image/png/1757665891784/1E9F118CF966AB3AF74E78AF9DD364C2.png","mobileImgSrc":"//qhstaticssl.kujiale.com/image/png/1757665891784/1E9F118CF966AB3AF74E78AF9DD364C2.png","link":"https://manycore-research.github.io/SpatialLM/","title":"Tr-a8b44a","desc":"Tr-d92406"},{"key":1,"imgSrc":"//qhstaticssl.kujiale.com/image/png/1757665891782/7BAFD1C38C9B9CAA293B12764823593F.png","mobileImgSrc":"//qhstaticssl.kujiale.com/image/png/1757665891782/7BAFD1C38C9B9CAA293B12764823593F.png","link":"https://huggingface.co/manycore-research/SpatialGen-1.0","title":"Tr-709400","desc":"Tr-dca023"}],"academics":[{"year":"2025","sign":"AAAI Conference on Artificial Intelligence","link":"https://arxiv.org/abs/2412.11892","title":"From 2D CAD Drawings to 3D Parametric Models: A Vision-Language Approach","author":"Xilin Wang, Jia Zheng, Yuanchao Hu, Hao Zhu, Qian Yu, Zihan Zhou","desc":"In this paper, we present CAD2Program, a new method for reconstructing 3D parametric models from 2D CAD drawings. Our proposed method is inspired by recent successes in vision-language models (VLMs), and departs from traditional methods which rely on task-specific data representations and/or algorithms. Specifically, on the input side, we simply treat the 2D CAD drawing as a raster image, regardless of its original format, and encode the image with a standard ViT model. We show that such an encoding scheme achieves competitive performance against existing methods that operate on vector-graphics inputs, while imposing substantially fewer restrictions on the 2D drawings. On the output side, our method auto-regressively predicts a…"},{"year":"2024","sign":"SIGGRAPH Asia 2024 Conference Papers","link":"https://dl.acm.org/doi/10.1145/3680528.3687680","title":"Neural Global Illumination via Superposed Deformable Feature Fields","author":"Chuankun Zheng, Yuchi Huo, Hongxiang Huang, Hongtao Sheng, Junrong Huang, Rui Tang, Hao Zhu, Rui Wang, Hujun Bao","desc":"Interactive rendering of dynamic scenes with complex global illumination has been a long-standing problem in computer graphics. Recent advances in neural rendering demonstrate new promising possibilities. However, while existing methods have achieved impressive results, complex rendering effects (e.g., caustics) remain challenging. This paper presents a novel neural rendering method that is able to generate high-quality global illumination effects, including but not limited to caustics, soft shadows, and indirect highlights, for dynamic scenes with varying camera, lighting conditions, materials, and object transformations. Inspired by object-oriented transfer field representations, we employ deformable neural feature fields to implicitly model the…"},{"year":"2023","sign":"ACM Transactions on Graphics","link":"https://coohom.github.io/LIGHTING/static/pdf/paper.pdf","title":"Data-driven digital lighting design for residential indoor spaces","author":"Haocheng Ren, Hangming Fan, Rui Wang, Yuchi Huo, Rui Tang, Lei Wang, Hujun Bao","desc":"Conventionally, interior lighting design is technically complex yet challenging and requires professional knowledge and aesthetic disciplines of designers. This article presents a new digital lighting design framework for virtual interior scenes, which allows novice users to automatically obtain lighting layouts and interior rendering images with visually pleasing lighting effects. The proposed framework utilizes neural networks to retrieve and learn underlying design guidelines and the principles beneath the existing lighting designs, e.g., a newly constructed dataset of 6k 3D interior scenes from professional designers with dense annotations of lights. With a 3D furniture-populated indoor scene as the input, the framework takes two stages to perform…"},{"year":"2023","sign":"Proceedings of the IEEE/CVF Conference on Computer Vision and Pattern Recognition","link":"https://arxiv.org/pdf/2303.07634","title":"I2-sdf: Intrinsic indoor scene reconstruction and editing via raytracing in neural sdfs","author":"Jingsen Zhu, Yuchi Huo, Qi Ye, Fujun Luan, Jifan Li, Dianbing Xi, Lisha Wang, Rui Tang, Wei Hua, Hujun Bao, Rui Wang","desc":"In this work, we present I^ 2-SDF, a new method for intrinsic indoor scene reconstruction and editing using differentiable Monte Carlo raytracing on neural signed distance fields (SDFs). Our holistic neural SDF-based framework jointly recovers the underlying shapes, incident radiance and materials from multi-view images. We introduce a novel bubble loss for fine-grained small objects and error-guided adaptive sampling scheme to largely improve the reconstruction quality on large-scale indoor scenes. Further, we propose to decompose the neural radiance field into spatially-varying material of the scene as a neural field through surface-based, differentiable Monte Carlo raytracing and emitter semantic segmentations, which enables physically based…"},{"year":"2023","sign":"ICCV 2023","link":"https://manycore-research.github.io/PlankAssembly","title":"PlankAssembly: Robust 3D Reconstruction from Three Orthographic Views with Learnt Shape Programs","author":"Wentao Hu, Jia Zheng, Zixin Zhang, Xiaojun Yuan, Jian Yin, Zihan Zhou","desc":"In this paper, we develop a new method to automatically convert 2D line drawings from three orthographic views into 3D CAD models. Existing methods for this problem reconstruct 3D models by back-projecting the 2D observations into 3D space while maintaining explicit correspondence between the input and output. Such methods are sensitive to errors and noises in the input, thus often fail in practice where the input drawings created by human designers are imperfect. To overcome this difficulty, we leverage the attention mechanism in a Transformer-based sequence generation model to learn flexible mappings between the input and output. Further, we design shape programs which are suitable for generating the objects of interest to boost the reconstruction accuracy and facilitate CAD modeling applications. Experiments on a new benchmark dataset show that our method significantly outperforms existing ones when the inputs are noisy or incomplete."},{"year":"2022","sign":"SIGGRAPH Asia 2022","link":"https://jingsenzhu.github.io/invrend","title":"Learning-based Inverse Rendering of Complex Indoor Scenes with Differentiable Monte Carlo Raytracing","author":"Jingsen Zhu, Fujun Luan, Yuchi Huo, Zihao Lin, Zhihua Zhong, Dianbing Xi, Jiaxiang Zheng, Rui Tang, Rui Wang, Hujun Bao","desc":"Indoor scenes typically exhibit complex, spatially-varying appearance from global illumination, making inverse rendering a challenging ill-posed problem. This work presents an end-to-end, learning-based inverse rendering framework incorporating differentiable Monte Carlo raytracing with importance sampling. The framework takes a single image as input to jointly recover the underlying geometry, spatially-varying lighting, and photorealistic materials. Specifically, we introduce a physically-based differentiable rendering layer with screen-space ray tracing, resulting in more realistic specular reflections that match the input photo. In addition, we create a large-scale, photorealistic indoor scene dataset with significantly richer details like complex furniture and dedicated decorations. Further, we design a novel out-of-view lighting network with uncertainty-aware refinement leveraging hypernetwork-based neural radiance fields to predict lighting outside the view of the input photo. Through extensive evaluations on common benchmark datasets, we demonstrate superior inverse rendering quality of our method compared to state-of-the-art baselines, enabling various applications such as complex object insertion and material editing with high fidelity."},{"year":"2022","sign":"CGF 2022","link":"https://coohom.github.io/MINERVAS","title":"MINERVAS: Massive Interior Environments Virtual Synthesis","author":"Haocheng Ren, Hao Zhang, Jia Zheng, Jiaxiang Zheng, Rui Tang, Yuchi Huo, Hujun Bao, Rui Wang","desc":"This paper presents MINERVAS, a Massive INterior EnviRonments VirtuAl Synthesis system, to facilitate the 3D scene modification and the 2D image synthesis for various vision tasks. In particular, we design a programmable pipeline with Domain-Specific Language, allowing users to  select scenes from the commercial indoor scene database, synthesize scenes for different tasks with customized rules, and render various imagery data, such as visual color, geometric structures, semantic label. Our system eases the difficulty of customizing massive numbers of scenes for different tasks and relieves users from manipulating fine-grained scene configurations by providing user-controllable randomness using multi-level samplers. Most importantly, it empowers users to access commercial scene databases with millions of indoor scenes and protects the copyright of core data assets, e.g., 3D CAD models. We demonstrate the validity and flexibility of our system by using our synthesized data to improve the performance on different kinds of computer vision tasks."},{"year":"2022","sign":"WACV 2022","link":"https://arxiv.org/abs/2104.07986","title":"Learning to Reconstruct 3D Non-Cuboid Room Layout from a Single RGB Image","author":"Cheng Yang, Jia Zheng, Xili Dai, Rui Tang, Yi Ma, Xiaojun Yuan","desc":"Single-image room layout reconstruction aims to reconstruct the enclosed 3D structure of a room from a single image. Most previous work relies on the cuboid-shape prior. This paper considers a more general indoor assumption, i.e., the room layout consists of a single ceiling, a single floor, and several vertical walls. To this end, we first employ Convolutional Neural Networks to detect planes and vertical lines between adjacent walls. Meanwhile, estimating the 3D parameters for each plane. Then, a simple yet effective geometric reasoning method is adopted to achieve room layout reconstruction. Furthermore, we optimize the 3D plane parameters to reconstruct a geometrically consistent room layout between planes and lines. The experimental results on public datasets validate the effectiveness and efficiency of our method."},{"year":"2021","sign":"CVPR 2021","link":"https://arxiv.org/abs/2103.10391","title":"Learning to Recommend Frame for Interactive Video Object Segmentation in the Wild","author":"Zhaoyuan Yin, Jia Zheng, Weixin Luo, Shenhan Qian, Hanling Zhang, Shenghua Gao","desc":"This paper proposes a framework for the interactive video object segmentation (VOS) in the wild where users can choose some frames for annotations iteratively. Then, based on the user annotations, a segmentation algorithm refines the masks. The previous interactive VOS paradigm selects the frame with some worst evaluation metric, and the ground truth is required for calculating the evaluation metric, which is impractical in the testing phase. In contrast, in this paper, we advocate that the frame with the worst evaluation metric may not be exactly the most valuable frame that leads to the most performance improvement across the video. Thus, we formulate the frame selection problem in the interactive VOS as a Markov Decision Process, where an agent is learned to recommend the frame under a deep reinforcement learning framework. The learned agent can automatically determine the most valuable frame, making the interactive setting more practical in the wild. Experimental results on the public datasets show the effectiveness of our learned agent without any changes to the underlying VOS algorithms."},{"year":"2021","sign":"CVPR 2021","link":"https://arxiv.org/abs/2103.17022","title":"Layout-Guided Novel View Synthesis from a Single Indoor Panorama","author":"Jiale Xu, Jia Zheng, Yanyu Xu, Rui Tang, Shenghua Gao","desc":"Existing view synthesis methods mainly focus on the perspective images and have shown promising results. However, due to the limited field-of-view of the pinhole camera, the performance quickly degrades when large camera movements are adopted. In this paper, we make the first attempt to generate novel views from a single indoor panorama and take the large camera translations into consideration. To tackle this challenging problem, we first use Convolutional Neural Networks (CNNs) to extract the deep features and estimate the depth map from the source-view image. Then, we leverage the room layout prior, a strong structural constraint of the indoor scene, to guide the generation of target views. More concretely, we estimate the room layout in the source view and transform it into the target viewpoint as guidance. Meanwhile, we also constrain the room layout of the generated target-view images to enforce geometric consistency. To validate the effectiveness of our method, we further build a large-scale photo-realistic dataset containing both small and large camera translations. The experimental results on our challenging dataset demonstrate that our method achieves state-of-the-art performance. "},{"year":"2020","sign":"ECCV 2020","link":"https://structured3d-dataset.org/","title":"Structured3D: A Large Photo-realistic Dataset for Structured 3D Modeling","author":"Jia Zheng, Junfei Zhang, Jing Li, Rui Tang, Shenghua Gao, Zihan Zhou","desc":"Recently, there has been growing interest in developing learning-based methods to detect and utilize salient semi-global or global structures, such as junctions, lines, planes, cuboids, smooth surfaces, and all types of symmetries, for 3D scene modeling and understanding. However, the ground truth annotations are often obtained via human labor, which is particularly challenging and inefficient for such tasks due to the large number of 3D structure instances (e.g., line segments) and other factors such as viewpoints and occlusions. In this paper, we present a new synthetic dataset, Structured3D, with the aim of providing large-scale photo-realistic images with rich 3D structure annotations for a wide spectrum of structured 3D modeling tasks. We take advantage of the availability of professional interior designs and automatically extract 3D structures from them. We generate high-quality images with an industry-leading rendering engine. We use our synthetic dataset in combination with real images to train deep networks for room layout estimation and demonstrate improved performance on benchmark datasets."},{"year":"2020","sign":"CVPR 2020","link":"https://github.com/chenqi008/HPGM","title":"Intelligent Home 3D: Automatic 3D-House Design from Linguistic Descriptions Only","author":"Qi Chen, Qi Wu, Rui Tang, Yuhan Wang, Shuai Wang, Mingkui Tan","desc":"Home design is a complex task that normally requires architects to finish with their professional skills and tools. It will be fascinating that if one can produce a house plan intuitively without knowing much knowledge about home design and experience of using complex designing tools, for example, via natural language. In this paper, we formulate it as a language conditioned visual content generation problem that is further divided into a floor plan generation and an interior texture (such as floor and wall) synthesis task. "},{"year":"2020","sign":"CVPR 2020","link":"https://openaccess.thecvf.com/content_CVPR_2020/html/Jin_Geometric_Structure_Based_and_Regularized_Depth_Estimation_From_360_Indoor_CVPR_2020_paper.html","title":"Geometric Structure Based and Regularized Depth Estimation From 360 Indoor Imagery","author":"Lei Jin, Yanyu Xu, Jia Zheng, Junfei Zhang, Rui Tang, Shugong Xu, Jingyi Yu, Shenghua Gao","desc":"Motivated by the correlation between the depth and the geometric structure of a 360 indoor image, we propose a novel learning-based depth estimation framework that leverages the geometric structure of a scene to conduct depth estimation. Specifically, we represent the geometric structure of an indoor scene as a collection of corners, boundaries and planes."},{"year":"2019","sign":"SIGGRAPH Asia 2019","link":"http://staff.ustc.edu.cn/~fuxm/projects/DeepLayout/index.html","title":"Data-driven Interior Plan Generation for Residential Buildings","author":"Wenming Wu, Xiao-Ming Fu, Rui Tang, Yuhan Wang, Yu-Hao Qi, Ligang Liu","desc":"Home design is a complex task that normally requires architects to finish with their professional skills and tools. It will be fascinating that if one can produce a house plan intuitively without knowing much knowledge about home design and experience of using complex designing tools, for example, via natural language. In this paper, we formulate it as a language conditioned visual content generation problem that is further divided into a floor plan generation and an interior texture (such as floor and wall) synthesis task."},{"year":"2019","sign":"SIGGRAPH Asia 2019","link":"https://adversarial.mcdenoising.org/#download","title":"Adversarial Monte Carlo Denoising with Conditioned Auxiliary Feature Modulation","author":"Bing Xu,Junfei Zhang,Rui Wang,Kun Xu,Yong-Liang Yang,Chuan LI, Rui Tang","desc":"Denoising Monte Carlo rendering with a very low sample rate remains a major challenge in the photo-realistic rendering research. Many previous works, including regression-based and learning-based methods, have been explored to achieve better rendering quality with less computational cost. However, most of these methods rely on handcrafted optimization objectives, which lead to artifacts such as blurs and unfaithful details. In this paper, we present an adversarial approach..."},{"year":"2018","sign":"BMVC 2018","link":"https://interiornet.org/","title":"InteriorNet: Mega-scale Multi-sensor Photo-rea
