<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>αLike</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ee;
  --bg-white: #ffffff;
  --bg-hover: #eceae4;
  --bg-input: #ffffff;
  --border: #e5e2db;
  --border-light: #eceae4;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #9a9a9a;
  --text-muted: #b0b0b0;
  --accent: #1a1a1a;
  --sidebar-width: 220px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-input: 0 1px 6px rgba(0,0,0,0.08);
  --transition: 0.2s ease;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Layout ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width);
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 12px;
  flex-shrink: 0;
  border-right: 1px solid transparent;
  overflow-y: auto;
}
.sidebar-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; color: var(--text-secondary);
  transition: all var(--transition); user-select: none; text-decoration: none;
}
.sidebar-nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.sidebar-nav-item.active { background: var(--bg-hover); color: var(--text-primary); font-weight: 500; }
.sidebar-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
.sidebar-nav-item.active svg { opacity: 1; }
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; margin-bottom: 4px;
  font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em;
}
.sidebar-logo .logo-icon {
  width: 22px; height: 22px; background: var(--text-primary); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 700;
}
.sidebar-section { margin-top: 8px; }
.sidebar-divider { height: 1px; background: var(--border-light); margin: 8px 12px; }
.sidebar-research-box {
  margin: 8px 0; background: var(--bg-white); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px;
}
.sidebar-bottom { margin-top: auto; padding-top: 8px; }
.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; color: var(--text-secondary);
}
.sidebar-user:hover { background: var(--bg-hover); }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #c8d6c5, #a8b8a5);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: white; position: relative;
}
.user-avatar::after {
  content: ''; position: absolute; bottom: 0; right: 0;
  width: 8px; height: 8px; background: #22c55e; border-radius: 50%; border: 2px solid var(--bg);
}
.user-badge { font-size: 10px; background: var(--bg-hover); padding: 1px 6px; border-radius: 4px; color: var(--text-tertiary); font-weight: 500; }

/* ===== Main Content ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* ===== Home View ===== */
.home-view {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 40px; max-width: 800px; margin: 0 auto; width: 100%; gap: 0;
}
.home-view.hidden { display: none; }
.home-title { font-size: 36px; font-weight: 600; color: var(--text-primary); margin-bottom: 32px; letter-spacing: -0.02em; text-align: center; line-height: 1.2; }

/* ===== Input Box ===== */
.input-container { width: 100%; max-width: 640px; position: relative; }
.input-box { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; box-shadow: var(--shadow-input); transition: all var(--transition); }
.input-box:focus-within { border-color: #ccc; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
.input-textarea { width: 100%; border: none; outline: none; font-size: 16px; font-family: var(--font); color: var(--text-primary); resize: none; background: transparent; min-height: 28px; max-height: 120px; line-height: 1.5; }
.input-textarea::placeholder { color: var(--text-muted); }
.input-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.input-left-actions { display: flex; align-items: center; gap: 8px; }
.input-add-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); transition: all var(--transition); }
.input-add-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.model-badge { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; background: var(--bg-hover); font-size: 13px; color: var(--text-secondary); cursor: pointer; border: none; font-family: var(--font); transition: all var(--transition); }
.model-badge:hover { background: #e0ded8; }
.model-badge .spark { font-size: 14px; }
.input-right-actions { display: flex; align-items: center; gap: 6px; }
.input-icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); transition: all var(--transition); }
.input-icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.input-send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: all var(--transition); opacity: 0.3; }
.input-send-btn.active { opacity: 1; }
.input-send-btn:hover { opacity: 0.85; }

/* ===== Suggestion Tasks ===== */
.suggestion-tasks { margin-top: 20px; max-width: 640px; width: 100%; }
.suggestion-task { padding: 12px 16px; cursor: pointer; color: var(--text-secondary); font-size: 14px; transition: all var(--transition); border-radius: var(--radius-sm); }
.suggestion-task:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ===== Researches View ===== */
.researches-view { flex: 1; display: none; overflow: hidden; }
.researches-view.active { display: flex; }

/* List panel */
.research-list-panel {
  width: 340px; border-right: 1px solid var(--border-light);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  transition: width 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
}
.research-list-panel.collapsed { width: 0; opacity: 0; border-right: none; padding: 0; }
.research-list-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); }
.research-list-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.research-list-actions { display: flex; gap: 4px; }
.research-list-action-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); transition: all var(--transition); }
.research-list-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.token-badge { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-tertiary); background: var(--bg-hover); padding: 3px 10px; border-radius: 12px; }
.research-list-input { padding: 12px 20px; border-bottom: 1px solid var(--border-light); }
.research-start-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: var(--font); color: var(--text-primary); background: var(--bg-white); outline: none; transition: all var(--transition); }
.research-start-input::placeholder { color: var(--text-muted); }
.research-start-input:focus { border-color: #ccc; box-shadow: var(--shadow-sm); }
.research-start-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.research-list-scroll { flex: 1; overflow-y: auto; padding: 8px; }
.research-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); margin-bottom: 2px; }
.research-item:hover { background: var(--bg-hover); }
.research-item.active { background: var(--bg-hover); }
.research-item-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: #22c55e; flex-shrink: 0; }
.research-item-icon.pending { color: var(--text-tertiary); }
.research-item-text { font-size: 14px; color: var(--text-primary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.research-item-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--bg-hover); color: var(--text-tertiary); white-space: nowrap; border: 1px solid var(--border-light); }
.research-item-menu { width: 24px; height: 24px; border-radius: 6px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); opacity: 0; transition: all var(--transition); }
.research-item:hover .research-item-menu { opacity: 1; }

/* Detail panel */
.research-detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.research-detail-header { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); }
.research-detail-header-left { display: flex; align-items: center; gap: 8px; }
.research-back-btn, .list-expand-btn {
  width: 32px; height: 32px; border-radius: var(--radius-sm); border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); transition: all var(--transition);
}
.research-back-btn:hover, .list-expand-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.research-detail-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.research-detail-actions { display: flex; align-items: center; gap: 8px; }
.detail-action-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-white); cursor: pointer; font-size: 13px; font-family: var(--font); color: var(--text-secondary); transition: all var(--transition); display: flex; align-items: center; gap: 6px; }
.detail-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.research-detail-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 15px; }

/* ===== Tab Bar ===== */
.detail-tab-bar {
  display: flex; align-items: center; padding: 0 20px;
  border-bottom: 1px solid var(--border-light); position: relative; flex-shrink: 0;
}
.detail-tab {
  padding: 10px 18px; font-size: 14px; font-weight: 500; color: var(--text-tertiary);
  cursor: pointer; transition: color var(--transition); position: relative; user-select: none;
}
.detail-tab:hover { color: var(--text-secondary); }
.detail-tab.active { color: var(--text-primary); }
.detail-tab-indicator {
  position: absolute; bottom: 0; height: 2px; background: var(--text-primary);
  border-radius: 1px; transition: left 0.25s ease, width 0.25s ease;
}

/* ===== Tab Panes ===== */
.detail-tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tab-pane { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-pane.active { display: flex; }

/* ===== League Table ===== */
.league-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px 8px; font-size: 13px; color: var(--text-secondary);
}
.league-updated { font-size: 12px; color: var(--text-tertiary); }
.league-scroll { flex: 1; overflow-y: auto; padding: 0 32px 24px; }
.league-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.league-table th {
  font-size: 12px; font-weight: 700; color: var(--text-primary); text-transform: uppercase;
  letter-spacing: 0.04em; padding: 10px 12px; text-align: left;
  border-bottom: 1px solid var(--border-light); position: sticky; top: 0; background: var(--bg);
}
.league-table th:first-child { width: 40px; text-align: center; }
.thesis-part { transition: all 0.2s; border-radius: 3px; padding: 1px 4px; margin: 0 -4px; }
.thesis-part:hover { background: rgba(0,0,0,0.06); }
.league-row { cursor: pointer; transition: background var(--transition); }
.league-row:hover { background: var(--bg-hover); }
.league-row td { padding: 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
.league-rank { font-size: 15px; font-weight: 600; color: var(--text-secondary); text-align: center; }
.league-company { font-weight: 600; font-size: 14px; }
.league-ticker { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.alike-score { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
.alike-score.high { color: #16a34a; }
.alike-score.medium { color: #d97706; }
.alike-score.low { color: var(--text-tertiary); }
.score-mini { display: flex; align-items: center; gap: 6px; }
.score-bar { width: 36px; height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; background: var(--text-primary); opacity: 0.5; }
.score-bar-fill.high { background: #16a34a; opacity: 0.7; }
.score-bar-fill.medium { background: #d97706; opacity: 0.7; }
.score-bar-fill.low { background: var(--text-tertiary); opacity: 0.5; }
.score-val { font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
.delta-pos { color: #16a34a; font-size: 12px; font-weight: 600; }
.delta-neg { color: #ef4444; font-size: 12px; font-weight: 600; }
.status-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
.status-badge.deep-dive { background: #dcfce7; color: #166534; }
.status-badge.monitoring { background: #fef3c7; color: #92400e; }
.status-badge.new { background: #ede9fe; color: #5b21b6; }
.league-highlights { font-size: 12px; color: var(--text-tertiary); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== Delta Proposal Cards (Status Tab) ===== */
.status-score-strip {
  display: flex; align-items: center; gap: 16px; padding: 16px 32px;
  border-bottom: 1px solid var(--border-light); flex-wrap: wrap;
}
.status-score-strip .strip-company { font-size: 18px; font-weight: 700; }
.status-score-strip .strip-rank { font-size: 13px; color: var(--text-tertiary); }
.status-score-strip .strip-alike {
  font-size: 28px; font-weight: 800; cursor: pointer; font-variant-numeric: tabular-nums;
}
.status-score-strip .strip-alike.high { color: #16a34a; }
.status-score-strip .strip-alike.medium { color: #d97706; }
.status-score-strip .strip-alike.low { color: var(--text-tertiary); }
.strip-dims {
  display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap;
}
.strip-dim {
  display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary);
  background: var(--bg); border-radius: 4px; padding: 3px 8px;
}
.strip-dim strong { font-size: 12px; color: var(--text-primary); }

.delta-section-header {
  display: flex; align-items: center; gap: 8px; padding: 16px 32px 8px;
  font-size: 14px; font-weight: 600;
}
.delta-section-count {
  background: var(--bg-hover); border-radius: 10px; padding: 1px 8px;
  font-size: 11px; color: var(--text-secondary); font-weight: 500;
}

.delta-proposal-card {
  margin: 8px 32px; padding: 16px; background: var(--bg-white);
  border: 1px solid var(--border); border-radius: var(--radius); transition: all var(--transition);
}
.delta-proposal-card:hover { border-color: var(--text-tertiary); }
.delta-proposal-card.applied { opacity: 0.6; border-color: #16a34a; }
.delta-proposal-card.rejected { opacity: 0.4; }

.delta-dim-changes {
  display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap;
}
.delta-dim-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg); border-radius: 6px; padding: 4px 10px; font-size: 13px; font-weight: 600;
}
.delta-dim-chip .dim-arrow { color: var(--text-tertiary); font-size: 11px; }
.delta-dim-chip .dim-new { color: #16a34a; }

.delta-signal {
  font-size: 13px; line-height: 1.6; margin-bottom: 8px; color: var(--text-secondary);
}
.delta-signal .signal-icon { margin-right: 4px; }
.delta-source {
  font-size: 11px; color: var(--text-tertiary); margin-bottom: 10px;
}

.delta-confidence-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.delta-confidence-bar {
  flex: 1; height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden;
}
.delta-confidence-fill {
  height: 100%; border-radius: 3px; transition: width 0.3s ease;
}
.delta-confidence-fill.high { background: #16a34a; }
.delta-confidence-fill.medium { background: #d97706; }
.delta-confidence-fill.low { background: #ef4444; }
.delta-confidence-pct {
  font-size: 13px; font-weight: 700; min-width: 36px; text-align: right;
  font-variant-numeric: tabular-nums;
}

.delta-status-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.delta-status-badge.proposed { background: #dbeafe; color: #1e40af; }
.delta-status-badge.investigating { background: #fef3c7; color: #92400e; }
.delta-status-badge.applied { background: #dcfce7; color: #166534; }
.delta-status-badge.rejected { background: #fee2e2; color: #991b1b; }

.delta-actions {
  display: flex; gap: 8px; margin-top: 4px;
}
.delta-btn {
  font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-white); cursor: pointer; font-weight: 500; transition: all var(--transition);
}
.delta-btn:hover { background: var(--bg-hover); }
.delta-btn.primary { background: var(--text-primary); color: white; border-color: var(--text-primary); }
.delta-btn.primary:hover { opacity: 0.85; }
.delta-btn.danger { color: #ef4444; border-color: #fecaca; }
.delta-btn.danger:hover { background: #fef2f2; }

/* ===== Artifacts Accordion ===== */
.artifacts-section { margin: 8px 32px; }
.artifacts-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 0;
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  cursor: pointer; user-select: none; border-bottom: 1px solid var(--border-light);
}
.artifacts-header:hover { color: var(--text-primary); }
.artifacts-chevron { transition: transform 0.2s ease; font-size: 10px; }
.artifacts-header.open .artifacts-chevron { transform: rotate(90deg); }
.artifacts-content { display: none; padding: 8px 0; }
.artifacts-header.open + .artifacts-content { display: block; }

/* ===== Cowork Redesign ===== */
.cowork-context-header {
  padding: 12px 24px; background: var(--bg-white);
  border-bottom: 1px solid var(--border-light); flex-shrink: 0;
}
.cowork-context-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.cowork-context-back {
  font-size: 12px; color: var(--text-tertiary); cursor: pointer; padding: 4px 8px;
  border-radius: 4px;
}
.cowork-context-back:hover { background: var(--bg-hover); color: var(--text-primary); }
.cowork-context-title { font-size: 14px; font-weight: 600; flex: 1; }
.cowork-context-confidence {
  display: flex; align-items: center; gap: 8px;
}
.cowork-context-conf-bar {
  width: 120px; height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden;
}
.cowork-context-conf-fill {
  height: 100%; border-radius: 3px; transition: width 0.4s ease;
}
.cowork-context-dim-chips { display: flex; gap: 6px; flex-wrap: wrap; }

.agent-debate-card {
  margin: 8px 24px; padding: 14px 16px; background: var(--bg-white);
  border: 1px solid var(--border-light); border-radius: var(--radius);
}
.agent-debate-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.agent-debate-emoji { font-size: 18px; }
.agent-debate-name { font-size: 13px; font-weight: 600; }
.agent-debate-conf-delta {
  margin-left: auto; font-size: 12px; font-weight: 700; padding: 2px 8px;
  border-radius: 4px;
}
.agent-debate-conf-delta.pos { background: #dcfce7; color: #166534; }
.agent-debate-conf-delta.neg { background: #fee2e2; color: #991b1b; }
.agent-debate-body { font-size: 13px; line-height: 1.6; color: var(--text-secondary); }

.cowork-user-msg {
  margin: 8px 24px; padding: 12px 16px; background: var(--text-primary); color: white;
  border-radius: var(--radius) var(--radius) 4px var(--radius); font-size: 13px;
  line-height: 1.6; margin-left: auto; max-width: 80%; width: fit-content;
}

.synthesis-card {
  margin: 12px 24px; padding: 16px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius);
}
.synthesis-card h4 { font-size: 13px; margin-bottom: 8px; }
.synthesis-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

.cowork-action-bar {
  display: flex; gap: 8px; padding: 12px 24px; border-top: 1px solid var(--border-light);
  background: var(--bg-white); flex-shrink: 0;
}
.cowork-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 14px; text-align: center; padding: 40px;
}
.cowork-empty .empty-hint { margin-top: 8px; font-size: 12px; }

/* ===== Score Breakdown Modal ===== */
.score-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.score-modal {
  background: var(--bg-white); border-radius: var(--radius-lg); width: 680px; max-height: 85vh;
  overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); padding: 32px; position: relative;
  animation: modalSlide 0.2s ease;
}
@keyframes modalSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.score-modal-close {
  position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
  border-radius: 50%; border: none; background: var(--bg-hover); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
}
.score-modal-close:hover { background: var(--border); }
.score-modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.score-modal .modal-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
.score-modal .modal-big-score {
  font-size: 48px; font-weight: 800; text-align: center; margin: 12px 0;
  font-variant-numeric: tabular-nums;
}
.score-modal .modal-big-score.high { color: #16a34a; }
.score-modal .modal-big-score.medium { color: #d97706; }
.score-modal .modal-big-score.low { color: var(--text-tertiary); }
.score-modal .formula-box {
  background: var(--bg); border-radius: var(--radius-sm); padding: 14px 18px;
  font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text-secondary);
  margin-bottom: 20px; line-height: 1.7; border: 1px solid var(--border-light);
}
.score-modal .formula-box .formula-label { font-weight: 600; color: var(--text-primary); font-family: var(--font); }
.dim-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.dim-table th {
  font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase;
  letter-spacing: 0.04em; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border);
}
.dim-table td { padding: 10px; border-bottom: 1px solid var(--border-light); font-size: 13px; }
.dim-table .dim-name { font-weight: 600; }
.dim-table .dim-label { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.dim-table .dim-bar-cell { width: 100px; }
.dim-table .dim-bar { height: 6px; border-radius: 3px; background: var(--border-light); overflow: hidden; }
.dim-table .dim-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
.dim-table .dim-bar-fill.high { background: #16a34a; }
.dim-table .dim-bar-fill.medium { background: #d97706; }
.dim-table .dim-bar-fill.low { background: var(--text-tertiary); }
.dim-table .dim-contribution { font-variant-numeric: tabular-nums; font-weight: 600; }
.weight-section { margin-top: 20px; }
.weight-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.causal-chain {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  background: var(--bg); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 12px;
}
.causal-node {
  background: var(--bg-white); border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 10px; font-size: 12px; font-weight: 600;
}
.causal-node.spine { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.causal-arrow { font-size: 14px; color: var(--text-tertiary); }
.weight-legend {
  display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); margin-top: 8px;
}
.weight-legend span::before {
  content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px;
}
.weight-legend .spine-legend::before { background: #1a1a1a; }
.weight-legend .support-legend::before { background: var(--border); }

/* ===== Cowork Tab ===== */
.cowork-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.cowork-company-pills {
  display: flex; gap: 6px; padding: 8px 32px 0; overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none; -ms-overflow-style: none;
}
.cowork-company-pills::-webkit-scrollbar { display: none; }
.cowork-pill {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 12px; font-size: 12px; border-radius: 16px;
  background: var(--bg-white); border: 1px solid var(--border-light);
  cursor: pointer; white-space: nowrap; color: var(--text-secondary);
  transition: all var(--transition); flex-shrink: 0;
}
.cowork-pill:hover { border-color: var(--text-tertiary); color: var(--text-primary); }
.cowork-loading { animation: coworkPulse 1.5s ease-in-out infinite; }
@keyframes coworkPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
.cowork-pill.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }
.cowork-scroll { flex: 1; overflow-y: auto; padding: 20px 32px 80px; display: flex; flex-direction: column; gap: 12px; }
.cowork-scroll > * { flex-shrink: 0; }
.cowork-msg { max-width: 85%; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; }

/* Signal & KQ Cards (small) */
.cowork-signal-card {
  width: 100%; padding: 10px 14px; background: #f5f7fa; border: 1px solid #e2e6ed;
  border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition);
}
.cowork-kq-card {
  width: 100%; padding: 10px 14px; background: #f5f7fa; border: 1px solid #e2e6ed;
  border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition);
}
.cowork-signal-card:hover { border-color: #9aa5b4; }
.cowork-kq-card:hover { border-color: #9aa5b4; }
.cowork-signal-card.applied { opacity: 0.5; }

/* Expanded Card (大卡片) */
.cowork-expanded-card {
  width: 100%; padding: 16px 20px; background: var(--bg-white);
  border: 2px solid var(--text-primary); border-radius: var(--radius);
  animation: expandIn 0.2s ease-out;
}
@keyframes expandIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.expanded-card-header { display: flex; align-items: center; gap: 8px; }
.expanded-card-close {
  cursor: pointer; font-size: 14px; color: var(--text-tertiary); padding: 2px 6px;
  border-radius: 4px; transition: all var(--transition);
}
.expanded-card-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.cowork-msg.user { align-self: flex-end; background: var(--text-primary); color: white; border-bottom-right-radius: 4px; }
.cowork-msg.ai { align-self: flex-start; background: var(--bg-white); border: 1px solid var(--border-light); border-bottom-left-radius: 4px; }
.cowork-msg strong { font-weight: 600; }

/* Mode Indicator */
.cowork-mode-bar {
  display: flex; align-items: center; gap: 16px; padding: 0 32px; flex-shrink: 0;
}
.cowork-mode-item {
  display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-tertiary);
  cursor: pointer; padding: 6px 0; transition: color var(--transition); user-select: none;
}
.cowork-mode-item:hover { color: var(--text-secondary); }
.cowork-mode-item.active { color: var(--text-primary); }
.cowork-mode-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--border);
  transition: all 0.3s ease;
}
.cowork-mode-item.active .cowork-mode-dot {
  background: #22c55e;
  box-shadow: 0 0 0 2px rgba(34,197,94,0.15);
  animation: modePulse 2s ease-in-out infinite;
}
@keyframes modePulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.15); }
  50% { box-shadow: 0 0 0 4px rgba(34,197,94,0.08); }
}

/* Spark Message */
.cowork-spark-msg {
  align-self: flex-end; max-width: 80%; padding: 12px 16px;
  background: var(--text-primary); color: white; border-radius: var(--radius);
  border-bottom-right-radius: 4px; font-size: 14px; line-height: 1.6;
}

/* Agent Selector (Fork) — compact single row */
.cowork-fork {
  align-self: flex-start; width: 100%; background: var(--bg-white);
  border: 1px solid var(--border-light); border-radius: var(--radius); padding: 10px 14px;
}
.cowork-fork-top {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.cowork-fork-label {
  font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase;
  letter-spacing: 0.04em;
}
.cowork-fork-go {
  padding: 4px 14px; border-radius: 6px; border: none;
  background: var(--text-primary); color: white; font-size: 12px; font-family: var(--font);
  cursor: pointer; font-weight: 500; transition: all var(--transition);
}
.cowork-fork-go:hover { opacity: 0.85; }
.cowork-fork-agents {
  display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
}
.cowork-fork-agents::-webkit-scrollbar { display: none; }
.cowork-fork-agent {
  display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 16px;
  border: 1px solid var(--border); background: var(--bg-white); font-size: 12px;
  color: var(--text-secondary); cursor: pointer; transition: all var(--transition);
  font-family: var(--font); white-space: nowrap; flex-shrink: 0;
}
.cowork-fork-agent:hover { border-color: #ccc; background: var(--bg-hover); }
.cowork-fork-agent.selected { border-color: var(--text-primary); background: var(--text-primary); color: white; }
.cowork-fork-agent .agent-emoji { font-size: 12px; }
.cowork-fork-agent .agent-rel {
  display: inline-flex; align-items: flex-end; gap: 1px; margin-left: 3px; height: 12px;
}
.cowork-fork-agent .rel-bar {
  width: 3px; border-radius: 1px; background: var(--border); transition: background 0.2s;
}
.cowork-fork-agent .rel-bar.b1 { height: 4px; }
.cowork-fork-agent .rel-bar.b2 { height: 8px; }
.cowork-fork-agent .rel-bar.b3 { height: 12px; }
.cowork-fork-agent .rel-bar.filled { background: var(--text-tertiary); }
.cowork-fork-agent.selected .rel-bar { background: rgba(255,255,255,0.25); }
.cowork-fork-agent.selected .rel-bar.filled { background: white; }

/* Agent Output Cards — Horizontal Carousel */
.cowork-agents-output {
  width: 100%; position: relative;
}
.cowork-agents-carousel {
  display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x mandatory;
  padding: 4px 2px 8px; scrollbar-width: none; -ms-overflow-style: none;
}
.cowork-agents-carousel::-webkit-scrollbar { display: none; }
.cowork-agents-nav {
  display: flex; align-items: center; justify-content: center; gap: 6px; padding: 4px 0 0;
}
.cowork-agents-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--border);
  cursor: pointer; transition: all 0.2s;
}
.cowork-agents-dot.active { background: var(--text-primary); width: 16px; border-radius: 3px; }
.cowork-agent-card {
  background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; transition: all var(--transition);
  min-width: 85%; max-width: 85%; scroll-snap-align: start; flex-shrink: 0;
}
.cowork-agent-card:hover { border-color: #ccc; box-shadow: var(--shadow-sm); }
.cowork-agent-card-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
}
.cowork-agent-emoji { font-size: 16px; flex-shrink: 0; }
.cowork-agent-name { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
.cowork-agent-conf {
  font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600;
  background: var(--bg-hover); color: var(--text-tertiary);
}
.cowork-agent-conf.high { background: #dcfce7; color: #166534; }
.cowork-agent-conf.medium { background: #fef3c7; color: #92400e; }
.cowork-agent-conf.low { background: #fef2f2; color: #991b1b; }
.cowork-agent-body {
  padding: 12px 14px; font-size: 13px; line-height: 1.7; color: var(--text-secondary);
  max-height: 220px; overflow-y: auto;
}
.cowork-agent-body p { margin-bottom: 8px; }
.cowork-agent-body strong { color: var(--text-primary); font-weight: 600; }
.cowork-agent-body ul { padding-left: 16px; margin-bottom: 8px; }
.cowork-agent-body li { margin-bottom: 4px; }
.cowork-agent-actions {
  display: flex; gap: 6px; padding: 8px 14px; border-top: 1px solid var(--border-light);
}
.cowork-agent-action-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-tertiary); cursor: pointer; font-family: var(--font);
  transition: all var(--transition);
}
.cowork-agent-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* Collision Panel (Orchestrator) */
.cowork-collision {
  width: 100%; background: var(--bg-white); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.cowork-collision-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: linear-gradient(135deg, rgba(124,58,237,0.04), rgba(245,158,11,0.04));
  border-bottom: 1px solid var(--border-light);
}
.cowork-collision-title { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
.cowork-collision-body { padding: 12px 14px; }
.cowork-collision-item {
  padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 6px;
  font-size: 13px; line-height: 1.6; cursor: pointer; transition: all var(--transition);
}
.cowork-collision-item:hover { background: var(--bg-hover); }
.cowork-collision-item.contradiction { border-left: 3px solid #ef4444; }
.cowork-collision-item.resonance { border-left: 3px solid #22c55e; }
.cowork-collision-item.exclusive { border-left: 3px solid #f59e0b; }
.cowork-collision-item .collision-type {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.cowork-collision-item.contradiction .collision-type { color: #ef4444; }
.cowork-collision-item.resonance .collision-type { color: #22c55e; }
.cowork-collision-item.exclusive .collision-type { color: #f59e0b; }
.cowork-collision-item .collision-text { color: var(--text-secondary); }
.cowork-collision-actions {
  display: flex; gap: 6px; padding: 8px 14px; border-top: 1px solid var(--border-light);
}

/* Crystallize button */
.cowork-crystallize-btn {
  display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
  padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-tertiary); cursor: pointer;
  font-family: var(--font); transition: all var(--transition);
}
.cowork-crystallize-btn:hover { background: #dcfce7; color: #166534; border-color: #bbf7d0; }

/* Quick actions */
.cowork-quick-actions { display: flex; gap: 8px; padding: 4px 32px 4px; flex-wrap: wrap; flex-shrink: 0; }
.quick-action-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-white); font-size: 13px; font-family: var(--font); color: var(--text-secondary); cursor: pointer; transition: all var(--transition); }
.quick-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: #ccc; }

/* ===== Status Tab ===== */
.status-scroll { flex: 1; overflow-y: auto; padding: 20px 32px 40px; }
.status-section { margin-bottom: 28px; }
.status-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light);
}
.status-section-title {
  font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-secondary); display: flex; align-items: center; gap: 8px;
}
.status-section-title .section-icon { font-size: 15px; opacity: 0.8; }
.status-section-count {
  font-size: 11px; background: var(--bg-hover); color: var(--text-tertiary);
  padding: 2px 8px; border-radius: 10px; font-weight: 600;
}
.status-section-add {
  width: 26px; height: 26px; border-radius: 6px; border: 1px dashed var(--border);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 14px; transition: all var(--transition);
}
.status-section-add:hover { background: var(--bg-hover); color: var(--text-primary); border-color: #ccc; }

/* Key Questions */
.kq-card {
  background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 10px; overflow: hidden; transition: all var(--transition);
}
.kq-card:hover { border-color: #ccc; box-shadow: var(--shadow-sm); }
.kq-card-main { padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
.kq-number {
  width: 24px; height: 24px; border-radius: 50%; background: var(--text-primary); color: white;
  font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.kq-content { flex: 1; min-width: 0; }
.kq-question { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.5; margin-bottom: 4px; }
.kq-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-tertiary); }
.kq-author-tag { padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.kq-author-tag.ai { background: #ede9fe; color: #5b21b6; }
.kq-author-tag.human { background: #dbeafe; color: #1e40af; }
.kq-author-tag.both { background: #dcfce7; color: #166534; }
.kq-expand-area {
  padding: 0 16px 14px 52px; display: none;
}
.kq-card.expanded .kq-expand-area { display: block; }
.kq-answer-doc {
  background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px;
  margin-bottom: 8px; cursor: pointer; transition: all var(--transition);
}
.kq-answer-doc:hover { background: var(--bg-hover); }
.kq-answer-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.kq-answer-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.kq-answer-preview { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.kq-answer-updated { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.kq-sources {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
}
.kq-source-chip {
  display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border-light); font-size: 11px;
  color: var(--text-secondary); cursor: pointer; transition: all var(--transition);
}
.kq-source-chip:hover { background: var(--bg-hover); border-color: #ccc; }
.kq-source-chip svg { width: 12px; height: 12px; opacity: 0.5; }
.kq-cowork-link {
  display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #7c3aed;
  cursor: pointer; margin-top: 8px; font-weight: 500;
}
.kq-cowork-link:hover { text-decoration: underline; }

/* Status doc cards (shared for AI Generated, Org X-ray, Memo, Inflection, Update Notes) */
.status-doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.status-doc-card {
  background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer; transition: all var(--transition);
}
.status-doc-card:hover { border-color: #ccc; box-shadow: var(--shadow-md); }
.status-doc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.status-doc-type { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.status-doc-type.ai-gen { background: #f3e8ff; color: #7c3aed; }
.status-doc-type.org-xray { background: #dcfce7; color: #166534; }
.status-doc-type.investment-memo { background: #dbeafe; color: #1e40af; }
.status-doc-type.inflection { background: #fef3c7; color: #92400e; }
.status-doc-type.update-notes { background: #e0e7ff; color: #3730a3; }
.status-doc-type.red-team { background: #fef2f2; color: #991b1b; }
.status-doc-auto { font-size: 10px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
.status-doc-auto .pulse { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
.status-doc-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; color: var(--text-primary); }
.status-doc-date { font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
.status-doc-summary {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

/* Status detail view (reused from old file detail) */
.status-detail-view { padding: 24px 32px; overflow-y: auto; flex: 1; }
.status-detail-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-tertiary); cursor: pointer; margin-bottom: 16px; }
.status-detail-back:hover { color: var(--text-primary); }

/* Where Are We — progress bar */
.status-progress { margin-bottom: 24px; }
.progress-stages { display: flex; align-items: center; gap: 0; }
.progress-stage {
  flex: 1; text-align: center; position: relative; padding: 8px 4px;
}
.progress-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--border); margin: 0 auto 6px;
  position: relative; z-index: 1;
}
.progress-dot.done { background: #22c55e; }
.progress-dot.active { background: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
.progress-label { font-size: 11px; color: var(--text-tertiary); }
.progress-stage.done .progress-label { color: var(--text-secondary); }
.progress-stage.active .progress-label { color: var(--text-primary); font-weight: 600; }
.progress-line {
  position: absolute; top: 12px; left: 50%; right: -50%; height: 2px; background: var(--border-light); z-index: 0;
}
.progress-stage:last-child .progress-line { display: none; }
.progress-stage.done .progress-line { background: #22c55e; }

/* Research content blocks */
.research-content h2 { font-size: 20px; font-weight: 600; margin-top: 24px; margin-bottom: 12px; }
.research-content h3 { font-size: 16px; font-weight: 600; margin-top: 20px; margin-bottom: 8px; }
.research-content p { margin-bottom: 12px; line-height: 1.7; }
.research-content ul { margin-bottom: 12px; padding-left: 20px; }
.research-content li { margin-bottom: 8px; line-height: 1.7; }
.research-content li strong { font-weight: 600; }
.source-tag { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 4px; background: var(--bg-hover); color: var(--text-tertiary); margin-left: 6px; font-weight: 500; vertical-align: middle; }

/* Detail input */
.research-detail-input { padding: 12px 32px 16px; border-top: 1px solid var(--border-light); flex-shrink: 0; }
.detail-input-box { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
.detail-input-field { flex: 1; border: none; outline: none; font-size: 14px; font-family: var(--font); color: var(--text-primary); background: transparent; }
.detail-input-field::placeholder { color: var(--text-muted); }
.detail-input-actions { display: flex; align-items: center; gap: 4px; }

/* ===== Module Views ===== */
.module-view { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
.module-view.active { display: flex; }
.module-icon { width: 64px; height: 64px; border-radius: 16px; background: var(--bg-hover); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.module-icon svg { width: 32px; height: 32px; color: var(--text-tertiary); }
.module-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.module-desc { font-size: 15px; color: var(--text-tertiary); text-align: center; max-width: 400px; }
.module-status { margin-top: 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-tertiary); padding: 6px 14px; background: var(--bg-hover); border-radius: 20px; }
.module-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; }

/* ===== Scrollbar & Top Bar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d5d3cd; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bbb8b0; }
.top-bar { position: absolute; top: 12px; right: 16px; display: flex; align-items: center; gap: 8px; z-index: 10; }
.top-bar-btn { padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-white); cursor: pointer; font-size: 13px; font-family: var(--font); color: var(--text-secondary); display: flex; align-items: center; gap: 6px; transition: all var(--transition); }
.top-bar-btn:hover { background: var(--bg-hover); }
.top-bar-icon-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-white); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); transition: all var(--transition); }
.top-bar-icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ===== Status Overview Grid ===== */
.status-overview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px;
  padding: 20px 32px 40px;
}
.status-overview-card {
  background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; cursor: pointer; transition: all var(--transition);
}
.status-overview-card:hover { border-color: #ccc; box-shadow: var(--shadow-md); transform: translateY(-1px); }
.status-overview-card-top {
  display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px;
}
.status-overview-rank {
  font-size: 13px; font-weight: 700; color: var(--text-tertiary); margin-right: 8px;
}
.status-overview-name { font-size: 15px; font-weight: 600; color: var(--text-primary); flex: 1; }
.status-overview-score {
  font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums;
}
.status-overview-score.high { color: #16a34a; }
.status-overview-score.medium { color: #d97706; }
.status-overview-score.low { color: var(--text-tertiary); }
.status-overview-divider { height: 1px; background: var(--border-light); margin-bottom: 10px; }
.status-overview-stage {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.status-overview-stage-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.status-overview-stage-dot.stage-pattern { background: #94a3b8; }
.status-overview-stage-dot.stage-org { background: #3b82f6; }
.status-overview-stage-dot.stage-kq { background: #eab308; }
.status-overview-stage-dot.stage-deep { background: #22c55e; }
.status-overview-stage-dot.stage-conviction { background: #a855f7; }
.status-overview-stage-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
.status-overview-meta {
  display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-tertiary);
}
.status-overview-meta-item { display: flex; align-items: center; gap: 4px; }
.status-overview-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px 0; font-size: 14px; color: var(--text-secondary);
}
.status-overview-subtitle { font-size: 12px; color: var(--text-tertiary); }
.status-back-to-overview {
  display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-tertiary);
  cursor: pointer; padding: 12px 32px 0; margin-bottom: -8px;
}
.status-back-to-overview:hover { color: var(--text-primary); }
.status-company-title {
  font-size: 18px; font-weight: 600; color: var(--text-primary);
  padding: 8px 32px 4px; display: flex; align-items: center; gap: 10px;
}
.status-company-score-badge {
  font-size: 14px; font-weight: 700; padding: 2px 10px; border-radius: 8px;
  background: #dcfce7; color: #166534;
}

/* ===== Animations ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease both; }
</style>

  { id: 1, friend: 'AppLovin', status: 'done', badge: '' },

];

// ===== Scoring Engine =====
// Dimension definitions (universal across all Old Friends)
const DIMENSIONS = {
  D1: { id: 'D1', name: 'CEO认知/Leadership Cognition', short: 'D1 CEO认知',
    definition: 'CEO/创始人对组织、战略、人才的认知深度。是否具备系统性思维，能在不确定性中做出高质量判断。',

  D2: { id: 'D2', name: 'Key Leader配置', short: 'D2 Leader配置',
    definition: '关键高管团队的质量、互补性和稳定性。CXO级别人才是否各就各位，是否有清晰的权责分工。',
    scoring: '5=梦之队（每个关键位置都是行业顶尖+互补）· 4=强配置（核心位置到位+团队稳定）· 3=基本到位（有短板但不致命）· 2=明显缺失（关键位置空缺或能力不足）· 1=团队混乱' },

// Weight multiplier matrix
const WEIGHT_MULTIPLIERS = {
  'spine_signature': 3.0,
  'spine_common': 2.5,
  'flywheel_signature': 2.0,
  'flywheel_common': 1.5,
  'support_signature': 1.5,
  'support_common': 1.0,
};

// Compute normalized weights for a given Winner Pattern
function computeWeights(pattern) {
  const rawWeights = {};
  let total = 0;
  for (const [dim, info] of Object.entries(pattern.baselines)) {
    const key = `${info.causalRole}_${info.diagnosticPower}`;
    const raw = WEIGHT_MULTIPLIERS[key] || 1.0;
    rawWeights[dim] = raw;
    total += raw;
  }
  const normalized = {};
  for (const [dim, raw] of Object.entries(rawWeights)) {
    normalized[dim] = raw / total;
  }
  return normalized;
}

// ===== Scoring Engine Core Functions =====
function computeAlikeScore(friendName, companyName) {
  const pattern = WINNER_PATTERNS[friendName];
  const candidate = CANDIDATE_SCORES[friendName]?.[companyName];
  if (!pattern || !candidate) return null;

  const weights = computeWeights(pattern);
  const dims = Object.keys(DIMENSIONS);
  let totalScore = 0;
  const breakdown = [];

  for (const dim of dims) {
    const baseline = pattern.baselines[dim].score;
    const candidateScore = candidate[dim] || 0;
    const matchRate = Math.min(candidateScore / baseline, 1.0); // cap at 100%
    const weight = weights[dim];
    const contribution = matchRate * weight * 100;
    totalScore += contribution;
    breakdown.push({
      dim,
      baseline,
      candidateScore,
      matchRate,
      weight,
      contribution,
      causalRole: pattern.baselines[dim].causalRole,
      diagnosticPower: pattern.baselines[dim].diagnosticPower,
      baselineEvidence: pattern.baselines[dim].evidence,
      candidateEvidence: candidate.evidence?.[dim] || '',
    });
  }

  return { alikeScore: Math.round(totalScore * 10) / 10, breakdown, weights };
}

// Compute delta from events
function computeDelta(friendName, companyName) {
  const pattern = WINNER_PATTERNS[friendName];
  const candidate = CANDIDATE_SCORES[friendName]?.[companyName];
  if (!pattern || !candidate) return { delta: 0, details: [] };

  // Collect ALL auto-applied signals for this company
  let proposals = [];
  try { proposals = getProposalsForCompany(friendName, companyName).filter(p => p.autoStatus === 'auto-applied'); } catch(e) {}

  if (proposals.length === 0) {
    // Fallback to legacy DELTA_EVENTS if no proposals
    const evt = DELTA_EVENTS[friendName]?.[companyName];
    if (!evt) return { delta: 0, details: [] };
    const weights = computeWeights(pattern);
    let deltaTotal = 0;
    const details = [];
    for (const [dim, change] of Object.entries(evt.dims)) {
      const baseline = pattern.baselines[dim]?.score || 1;
      const oldScore = candidate[dim] - change;
      const newScore = candidate[dim];
      const oldMatch = Math.min(oldScore / baseline, 1.0);
      const newMatch = Math.min(newScore / baseline, 1.0);
      const dimDelta = (newMatch - oldMatch) * weights[dim] * 100;
      deltaTotal += dimDelta;
      details.push({ dim, change, oldScore, newScore, dimDelta: Math.round(dimDelta * 10) / 10 });
    }
    return { delta: Math.round(deltaTotal * 10) / 10, signal: evt.signal, details };
  }

  // Sum all dims from all auto-applied proposals
  const weights = computeWeights(pattern);
  const dimSums = {};
  proposals.forEach(p => {
    for (const [dim, change] of Object.entries(p.dims || {})) {
      dimSums[dim] = (dimSums[dim] || 0) + change;
    }
  });

  let deltaTotal = 0;
  const details = [];
  for (const [dim, totalChange] of Object.entries(dimSums)) {
    const baseline = pattern.baselines[dim]?.score || 1;
    const newScore = candidate[dim];
    const oldScore = newScore - totalChange;
    const oldMatch = Math.min(Math.max(oldScore / baseline, 0), 1.0);
    const newMatch = Math.min(Math.max(newScore / baseline, 0), 1.0);
    const dimDelta = (newMatch - oldMatch) * weights[dim] * 100;
    deltaTotal += dimDelta;
    details.push({ dim, change: totalChange, oldScore: Math.round(oldScore * 10) / 10, newScore, dimDelta: Math.round(dimDelta * 10) / 10 });
  }

  return {
    delta: Math.round(deltaTotal * 10) / 10,
    signal: `${proposals.length}条已生效signal`,
    details,
  };
}

// ===== Three Investment Criteria =====
// 1. Alike Verdict
function getAlikeVerdict(score) {
  if (score >= 80) return { pass: true, icon: '✅', label: '高匹配', cls: 'high' };
  if (score >= 60) return { pass: false, icon: '', label: '中等', cls: 'medium' };
  return { pass: false, icon: '❌', label: '低匹配', cls: 'low' };
}

// 2. Delta Verdict (org trajectory)
function getDeltaVerdict(delta) {
  if (delta > 0) return { status: 'positive', icon: '↑', label: '组织在变好', cls: 'pos' };
  if (delta < 0) return { status: 'negative', icon: '↓', label: '组织在变差', cls: 'neg' };
  return { status: 'neutral', icon: '→', label: '持平', cls: 'neutral' };
}

// 3. Biz Inflection (from KQ verdicts)
function computeBizInflection(friendName, companyName) {
  let data;
  try { data = COMPANY_STATUS[friendName]?.[companyName]; } catch(e) { return { status: 'unknown', icon: '⚪', label: '初始化中', cls: 'unknown' }; }
  const kqs = data?.keyQuestions || [];
  if (kqs.length === 0) return { status: 'unknown', icon: '⚪', label: '无KQ', cls: 'unknown' };

  const greens = kqs.filter(k => k.verdict === 'green').length;
  const reds = kqs.filter(k => k.verdict === 'red').length;
  const criticalRed = kqs.some(k => k.blocking && k.verdict === 'red');

  if (criticalRed) return { status: 'denied', icon: '🔴', label: '关键KQ否决', cls: 'denied' };
  if (greens > kqs.length / 2) return { status: 'confirmed', icon: '🟢', label: '拐点确认', cls: 'confirmed' };
  if (reds > 0) return { status: 'at-risk', icon: '🟠', label: '有否定信号', cls: 'risk' };
  return { status: 'pending', icon: '🟡', label: '待验证', cls: 'pending' };
}

function syncSignalToStatus(friendName, companyName, signal) {
  if (!DELTA_PROPOSALS[friendName]) DELTA_PROPOSALS[friendName] = {};
  if (!DELTA_PROPOSALS[friendName][companyName]) DELTA_PROPOSALS[friendName][companyName] = [];
  const existing = DELTA_PROPOSALS[friendName][companyName];
  // Dedup by signal text similarity (>80% overlap)
  const isDup = existing.some(p => {
    const a = (p.signal || '').slice(0, 40);
    const b = (signal.signal || '').slice(0, 40);
    return a === b || p.id === signal.id;
  });
  if (isDup) return false;
  existing.push(signal);
  // Rebuild league table
  LEAGUE_TABLE_DATA[friendName] = buildLeagueTable(friendName);
  return true;
}

function syncKQToStatus(friendName, companyName, kq) {
  if (!COMPANY_STATUS[friendName]) COMPANY_STATUS[friendName] = {};
  if (!COMPANY_STATUS[friendName][companyName]) COMPANY_STATUS[friendName][companyName] = { keyQuestions: [] };
  const data = COMPANY_STATUS[friendName][companyName];
  if (!data.keyQuestions) data.keyQuestions = [];
  // Dedup by question text similarity or ID
  const isDup = data.keyQuestions.some(k => {
    return k.id === kq.id || (k.question || '').slice(0, 30) === (kq.question || '').slice(0, 30);
  });
  if (isDup) {
    // Merge: update existing KQ's evidence_trail
    const existingKQ = data.keyQuestions.find(k => k.id === kq.id || (k.question || '').slice(0, 30) === (kq.question || '').slice(0, 30));
    if (existingKQ && kq.evidence_trail?.length) {
      if (!existingKQ.evidence_trail) existingKQ.evidence_trail = [];
      kq.evidence_trail.forEach(e => {
        const exists = existingKQ.evidence_trail.some(ex => ex.content === e.content);
        if (!exists) existingKQ.evidence_trail.push(e);
      });
    }
    return false;
  }
  data.keyQuestions.push(kq);
  // Rebuild league table for biz inflection
  LEAGUE_TABLE_DATA[friendName] = buildLeagueTable(friendName);
  return true;
}

function toggleKQVerdict(friendName, companyName, kqId) {
  const data = COMPANY_STATUS[friendName]?.[companyName];
  const kq = data?.keyQuestions?.find(k => k.id === kqId);
  if (!kq) return;
  const cycle = { yellow: 'green', green: 'red', red: 'yellow', undefined: 'green' };
  kq.verdict = cycle[kq.verdict || 'yellow'];
  // Rebuild league table to reflect biz inflection change
  const research = RESEARCHES.find(r => r.id === selectedResearch);
  if (research) LEAGUE_TABLE_DATA[research.friend] = buildLeagueTable(research.friend);
  renderStatusTab();
  persistAll();
}

// Build full league table from Scoring Engine (replaces old LEAGUE_TABLE_DATA)
function buildLeagueTable(friendName) {
  const candidates = CANDIDATE_SCORES[friendName];
  if (!candidates) return [];

  const rows = [];
  for (const [company, data] of Object.entries(candidates)) {
    const result = computeAlikeScore(friendName, company);
    const deltaInfo = computeDelta(friendName, company);
    if (!result) continue;
    const bizInflection = computeBizInflection(friendName, company);
    rows.push({
      company,
      ticker: data.ticker,
      alikeScore: result.alikeScore,
      breakdown: result.breakdown,
      weights: result.weights,
      delta: deltaInfo.delta,
      deltaInfo,
      bizInflection,
      status: data.status,
      highlights: data.highlights,
    });
  }

  // Sort by alikeScore descending, assign ranks
  rows.sort((a, b) => b.alikeScore - a.alikeScore);
  rows.forEach((r, i) => r.rank = i + 1);
  return rows;
}

// Convert scoring JSON from vault → frontend data structures
function scoringToFrontend(scoring, friend, company) {
  const proposals = [];
  const kqs = [];

  // auto_applied + proposals + watch → DELTA_PROPOSALS entries
  for (const sig of (scoring.auto_applied || [])) {
    if (sig.stale) continue; // Skip stale signals
    proposals.push({
      id: sig.id || `dp_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
      dims: sig.dims || sig.delta || {},
      signal: sig.signal,
      confidence: sig.confidence || 0,
      source: sig.source || '',
      status: sig.confidence >= 80 ? 'applied' : 'proposed',
      autoStatus: sig.confidence >= 80 ? 'auto-applied' : 'signal-only',
      evidenceLevel: sig.source_classification === 'S5' ? 4 : sig.source_classification === 'S4' ? 3 : 2,
      bestSource: sig.source_classification || 'S3',
      evidences: sig.evidences || [{
        text: sig.signal,
        sourceType: sig.source_classification || classifySource(sig.source + ' ' + sig.signal),
        dims: sig.dimensions || Object.keys(sig.dims || sig.delta || {}),
        addedBy: 'agent',
      }],
      triangulate: sig.triangulate || null,
      event_date: sig.event_date || null,
      stale: false,
      createdAt: Date.now(),
      updatedAt: Date.now(),
    });
  }
  // Add stale signals to proposals with stale flag for display
  for (const cat of ['auto_applied', 'proposals', 'watch']) {
    for (const sig of (scoring[cat] || [])) {
      if (sig.stale) {
        proposals.push({
          id: sig.id,
          dims: sig.dims || {},
          signal: sig.signal,
          confidence: sig.confidence || 0,
          source: sig.source || '',
          status: 'stale',
          autoStatus: 'stale',
          stale: true,
          stale_reason: sig.stale_reason || '',
          superseded_by: sig.superseded_by || null,
          event_date: sig.event_date || null,
          triangulate: sig.triangulate || null,
          evidences: [],
          createdAt: Date.now(),
          updatedAt: Date.now(),
        });
      }
    }
  }
  for (const sig of [...(scoring.proposals || []), ...(scoring.watch || [])]) {
    if (sig.stale) continue; // Skip stale signals
    proposals.push({
      id: sig.id || `dp_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
      dims: sig.dims || sig.delta || {},
      signal: sig.signal,
      confidence: sig.confidence || 0,
      source: sig.source || '',
      status: 'proposed',
      autoStatus: 'signal-only',
      evidenceLevel: sig.source_classification === 'S5' ? 4 : 2,
      bestSource: sig.source_classification || 'S3',
      evidences: sig.evidences || [{
        text: sig.signal,
        sourceType: sig.source_classification || 'S3',
        dims: sig.dimensions || Object.keys(sig.dims || sig.delta || {}),
        addedBy: 'agent',
      }],
      triangulate: sig.triangulate || null,
      event_date: sig.event_date || null,
      stale: false,
      createdAt: Date.now(),
      updatedAt: Date.now(),
    });
  }

  // key_questions → COMPANY_STATUS keyQuestions
  for (const kq of (scoring.key_questions || [])) {
    kqs.push({
      id: kq.id,
      question: kq.question,
      author: kq.author || 'ai',
      answer: { title: (kq.evolving_answer || '').slice(0, 60), preview: kq.evolving_answer || '', updated: scoring.date },
      sources: (kq.sources || []).map(s => typeof s === 'string' ? { name: s, type: 'data-infra' } : s),
      resolves_by: kq.resolves_by,
      evolving_answer: kq.evolving_answer,
      verdict: kq.verdict || 'yellow',
      blocking: kq.blocking || false,
      verification_metrics: kq.verification_metrics || [],
      evidence_trail: kq.evidence_trail || [],
    });
  }

  return { proposals, kqs, staleSignals, nextCatalyst: scoring.next_catalyst };
}

async function coworkApiCall(endpoint, body) {
  try {
    const resp = await fetch(COWORK_API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return await resp.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function coworkApiStream(endpoint, body, onChunk, onDone) {
  try {
    const resp = await fetch(COWORK_API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      if (onDone) onDone(null, err.error || resp.statusText);
      return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: [DONE]')) continue;
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) { fullText += data.text; onChunk(data.text, fullText); }
            if (data.error) { if (onDone) onDone(null, data.error); return; }
          } catch (e) { /* skip malformed */ }
        }
      }
    }
    if (onDone) onDone(fullText);
  } catch (e) {
    if (onDone) onDone(null, e.message);
  }
}

// ===== Source & Evidence Classification =====
const SOURCE_CREDIBILITY = {
  S5: { label: '客观事实·直接', multiplier: 1.0,  examples: '官网上线、SEC filing、GitHub public、财报' },
  S4: { label: '客观事实·间接推导', multiplier: 0.85, examples: 'commit频率推导、专利申报推导、headcount推导' },
  S3: { label: '主观·创始人/管理层/专家', multiplier: 0.7,  examples: 'podcast创始人发言、专家访谈、管理层演讲' },
  S2: { label: '主观·买方/媒体', multiplier: 0.55, examples: '投资人采访、TechCrunch报道、买方研报' },
  S1: { label: '主观·卖方研报', multiplier: 0.4,  examples: '摩根/高盛研报' },
};

const EVIDENCE_LEVELS = {
  4: { label: '多维度×多信源', multiplier: 1.0 },
  3: { label: '多维度×单信源', multiplier: 0.8 },
  2: { label: '单维度×多信源', multiplier: 0.6 },
  1: { label: '单维度×单信源', multiplier: 0.4 },
};

function classifySource(text) {
  if (/官网|SEC|财报|GitHub.*public|上线|发布|公告|earnings|10-K|10-Q|annual report/i.test(text)) return 'S5';
  if (/commit.*频率|专利|headcount.*但|招聘.*撤下|compute.*支出|satellite|patent.*fil/i.test(text)) return 'S4';
  if (/创始人|CEO|CTO|founder|管理层|VP|我.*聊|访谈|专家|podcast.*(?:创始|CEO|CTO|founder|说|讲|提到|Mensch|Arthur|Dario|Jensen|Huang)|管理层.*YouTube|管理层.*演讲|一手|我.*和.*聊|听.*说/i.test(text)) return 'S3';
  if (/投资人|买方|媒体|TechCrunch|报道|采访|Bloomberg|Reuters|WSJ/i.test(text)) return 'S2';
  if (/卖方|研报|摩根|高盛|analyst|initiate|coverage|price target/i.test(text)) return 'S1';
  return 'S2';
}

function classifyDimensions(text) {
  const dims = [];
  if (/认知|vision|recursive|递归|第一性|CEO.*说|创始人.*说|leadership.*cognition|Arthur|Dario|founder.*说|podcast.*说/i.test(text)) dims.push('D1');
  if (/leader配置|管理层.*变动|VP|CTO.*加入|团队.*结构|key.*leader/i.test(text)) dims.push('D2');
  if (/考核|激励|绩效|pass.*no.*pass|晋升|compensation|incentive/i.test(text)) dims.push('D3');
  if (/信息架构|决策.*效率|透明|demo.*book|直报/i.test(text)) dims.push('D4');
  if (/熵减|AI.*内部|自家.*工具|Claudification|效率.*提升|用.*写.*自己/i.test(text)) dims.push('D5');
  if (/人才|talent|招聘|hire|research.*加入|离职|glassdoor/i.test(text)) dims.push('D6');
  if (/bet|all.in|赌注|战略.*取舍|coding|enterprise|大单|palantir/i.test(text)) dims.push('D7');
  if (/适配|fit|org.*业务|组织.*服务/i.test(text)) dims.push('Fit');
  return dims.length > 0 ? dims : ['D1'];
}

// ===== Confidence Computation =====
function computeProposalConfidence(proposal) {
  if (!proposal.evidences || proposal.evidences.length === 0) {
    // Legacy: use old confidence if no evidences yet
    return proposal.confidence || 30;
  }
  // 1. Evidence dimensionality
  const uniqueDims = new Set(proposal.evidences.flatMap(e => e.dims));
  const uniqueSourceTypes = new Set(proposal.evidences.map(e => e.sourceType));
  const multiDim = uniqueDims.size >= 2;
  const multiSource = uniqueSourceTypes.size >= 2;
  const evidenceLevel = multiDim && multiSource ? 4 : multiDim ? 3 : multiSource ? 2 : 1;
  const evidenceMultiplier = EVIDENCE_LEVELS[evidenceLevel].multiplier;

  // 2. Best source credibility
  const sourceRanks = { S5: 1.0, S4: 0.85, S3: 0.7, S2: 0.55, S1: 0.4 };
  let bestSourceType = 'S1';
  proposal.evidences.forEach(e => {
    if ((sourceRanks[e.sourceType] || 0) > (sourceRanks[bestSourceType] || 0)) bestSourceType = e.sourceType;
  });
  const sourceMultiplier = sourceRanks[bestSourceType];

  // 3. Agent consensus base
  const agentBase = proposal.agentVotes.length > 0
    ? Math.max(0.3, Math.min(1.0, 0.5 + proposal.agentVotes.reduce((s, v) => s + v.delta, 0) / 100))
    : 0.5;

  // 4. Volume bonus (more evidence = small boost, capped)
  const volumeBonus = Math.min(0.15, proposal.evidences.length * 0.03);

  const raw = (agentBase + volumeBonus) * evidenceMultiplier * sourceMultiplier * 100;
  return Math.round(Math.min(100, Math.max(0, raw)));
}

function checkAutoDecision(proposal, friend, company) {
  const conf = computeProposalConfidence(proposal);
  proposal.confidence = conf;
  // Compute evidence level for display
  if (proposal.evidences && proposal.evidences.length > 0) {
    const uniqueDims = new Set(proposal.evidences.flatMap(e => e.dims));
    const uniqueSources = new Set(proposal.evidences.map(e => e.sourceType));
    proposal.evidenceLevel = (uniqueDims.size >= 2 && uniqueSources.size >= 2) ? 4 : (uniqueDims.size >= 2) ? 3 : (uniqueSources.size >= 2) ? 2 : 1;
    const sourceRanks = { S5: 1.0, S4: 0.85, S3: 0.7, S2: 0.55, S1: 0.4 };
    let best = 'S1';
    proposal.evidences.forEach(e => { if ((sourceRanks[e.sourceType]||0) > (sourceRanks[best]||0)) best = e.sourceType; });
    proposal.bestSource = best;
  }

  if (conf >= 80 && proposal.autoStatus !== 'auto-applied') {
    proposal.autoStatus = 'auto-applied';
    proposal.status = 'applied';
    // Score already in CANDIDATE_SCORES for pre-seeded data
    LEAGUE_TABLE_DATA[friend] = buildLeagueTable(friend);
  } else if (conf >= 60) {
    proposal.autoStatus = 'needs-evidence';
  } else {
    proposal.autoStatus = 'signal-only';
  }
  proposal.updatedAt = Date.now();
}

function getConfidenceGuidance(proposal) {
  const eLevel = proposal.evidenceLevel || 1;
  const bestSrc = proposal.bestSource || 'S2';
  const tips = [];
  if (eLevel <= 2) tips.push('补充更多维度的交叉验证 → 提升材料维度等级');
  if (eLevel <= 1 || (eLevel === 2 && bestSrc >= 'S3')) tips.push('寻找第二个独立信源佐证 → 提升材料维度等级');
  if (bestSrc === 'S1' || bestSrc === 'S2') tips.push('寻找一手信息（创始人发言/专家访谈）→ 提升信源等级');
  if (bestSrc === 'S3') tips.push('寻找客观事实验证（官网/GitHub/SEC filing）→ 提升至 S4-S5');
  if (bestSrc === 'S4') tips.push('补充直接客观事实（产品上线/财报数据）→ 提升至 S5');
  // No tips needed if evidence is already strong
  return tips;
}

// ===== Init Delta Proposals =====
function initDeltaProposals() {
  // Step 1: Initialize from hard-coded DELTA_EVENTS (fallback)
  for (const [friend, companies] of Object.entries(DELTA_EVENTS)) {
    if (!DELTA_PROPOSALS[friend]) DELTA_PROPOSALS[friend] = {};
    for (const [company, evt] of Object.entries(companies)) {
      // Skip if already loaded from vault API
      if (DELTA_PROPOSALS[friend][company]?.length > 0) continue;
      const proposal = {
        id: `dp_${friend}_${company}`.replace(/\s/g, '_'),
        dims: { ...evt.dims },
        signal: evt.signal,
        confidence: 0,
        source: evt.source,
        status: 'proposed',
        autoStatus: 'signal-only',
        evidenceLevel: 1,
        bestSource: 'S3',
        evidences: [{
          text: evt.signal,
          sourceType: classifySource(evt.source + ' ' + evt.signal),
          dims: Object.keys(evt.dims),
          addedBy: 'agent',
        }],
        createdAt: Date.now(),
        updatedAt: Date.now(),
      };
      proposal.triangulate = generateTriangulate(proposal, company, friend) || regenerateTriangulate(proposal, friend, company);
      DELTA_PROPOSALS[friend][company] = [proposal];
      if (evt.confidence && evt.confidence > 50) {
        proposal.confidence = evt.confidence;
        proposal.bestSource = classifySource(evt.source + ' ' + evt.signal);
        if (evt.autoStatus) proposal.autoStatus = evt.autoStatus;
        if (evt.confidence >= 80 && evt.autoStatus === 'auto-applied') {
          proposal.status = 'applied';
        }
      } else {
        checkAutoDecision(proposal, friend, company);
      }
    }
    LEAGUE_TABLE_DATA[friend] = buildLeagueTable(friend);
  }
}

// Load scoring from vault API → replace hard-coded data for companies with vault data
async function loadScoringFromVault() {
  try {
    const resp = await fetch(COWORK_API + '/api/companies');
    if (!resp.ok) return;
    const { companies } = await resp.json();
    if (!companies?.length) return;

    for (const comp of companies) {
      if (!comp.has_scoring) continue;
      const slug = comp.slug;

      // Fetch scoring data first, then determine which friend it belongs to
      try {
        const sResp = await fetch(COWORK_API + '/api/scoring/' + slug);
        if (!sResp.ok) continue;
        const { data: scoring } = await sResp.json();
        if (!scoring) continue;

        // Use vault's old_friend field to match, fallback to first CANDIDATE_SCORES match
        let matchedFriend = null, matchedCompany = slug;
        const vaultFriend = scoring?.old_friend;
        if (vaultFriend && CANDIDATE_SCORES[vaultFriend]?.[slug]) {
          matchedFriend = vaultFriend;
        } else {
          for (const [friend, candidates] of Object.entries(CANDIDATE_SCORES)) {
            if (candidates[slug]) { matchedFriend = friend; break; }
          }
        }
        if (!matchedFriend) continue;

        // Convert to frontend structures
        const { proposals, kqs, staleSignals, nextCatalyst } = scoringToFrontend(scoring, matchedFriend, matchedCompany);

        // Replace DELTA_PROPOSALS for this company
        if (proposals.length > 0) {
          if (!DELTA_PROPOSALS[matchedFriend]) DELTA_PROPOSALS[matchedFriend] = {};
          DELTA_PROPOSALS[matchedFriend][matchedCompany] = proposals;
          // Auto-apply high confidence ones
          proposals.forEach(p => {
            if (p.confidence >= 80 && p.autoStatus === 'auto-applied') {
              p.status = 'applied';
            }
          });
          LEAGUE_TABLE_DATA[matchedFriend] = buildLeagueTable(matchedFriend);
          console.log(`[Vault] Loaded ${proposals.length} signals for ${matchedCompany} from vault`);
        }

        // Update COMPANY_STATUS with KQs + staleSignals
        if (COMPANY_STATUS[matchedFriend]?.[matchedCompany]) {
          if (kqs.length > 0) {
            COMPANY_STATUS[matchedFriend][matchedCompany].keyQuestions = kqs;
            COMPANY_STATUS[matchedFriend][matchedCompany].questionCount = kqs.length;
            console.log(`[Vault] Loaded ${kqs.length} KQs for ${matchedCompany} from vault`);
          }
          if (staleSignals.length > 0) {
            COMPANY_STATUS[matchedFriend][matchedCompany].staleSignals = staleSignals;
            console.log(`[Vault] ${staleSignals.length} stale signals for ${matchedCompany}`);
          }
        }
      } catch (e) {
        console.warn(`[Vault] Failed to load scoring for ${slug}:`, e);
      }
    }

    // Load artifacts for each company
    await loadArtifactsFromVault();

    // Re-render if currently viewing
    if (selectedResearch) renderCurrentView();
  } catch (e) {
    console.warn('[Vault] API not available, using hard-coded data:', e.message);
  }
}

async function loadArtifactsFromVault() {
  for (const [company, slug] of Object.entries(VAULT_SLUGS)) {
    try {
      const resp = await fetch(COWORK_API + '/api/artifacts/' + slug);
      if (!resp.ok) continue;
      const respJson = await resp.json();
      const artifacts = respJson.data?.artifacts || respJson.artifacts || {};
      if (!artifacts || Object.keys(artifacts).length === 0) continue;

      // Find which friend this company belongs to
      for (const [friend, candidates] of Object.entries(CANDIDATE_SCORES)) {
        if (!candidates[company]) continue;
        const data = COMPANY_STATUS[friend]?.[company];
        if (!data) continue;
        if (!data.artifacts) data.artifacts = {};

        for (const [type, doc] of Object.entries(artifacts)) {
          // doc can be a single object or an array — normalize to array
          const docsArr = Array.isArray(doc) ? doc : [doc];
          data.artifacts[type] = docsArr.map(d => ({
            id: `art_${type}_${d.generated || Date.now()}`,
            title: d.title || `${company} ${type}`,
            summary: (d.summary || d.content || '').slice(0, 100) + '...',
            content: d.content || '',
            updated: d.generated || new Date().toISOString().slice(0, 10),
            auto: true,
          }));
        }
        console.log(`[Vault] Loaded artifacts for ${company}:`, Object.keys(artifacts).join(', '));
        break;
      }
    } catch (e) {
      console.warn(`[Vault] Failed to load artifacts for ${company}:`, e.message);
    }
  }
}

// Generate signals for a company (called from UI refresh button)
async function generateSignals(company, friend, mode = 'full') {
  const slug = VAULT_SLUGS[company] || company;
  console.log(`[Generate] Starting ${mode} signal generation for ${company}...`);

  try {
    const resp = await fetch(COWORK_API + '/api/generate-signals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company: slug, friend, mode }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let result = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: [DONE]')) continue;
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.phase === 'result' && data.data) result = data.data;
          } catch (e) { /* skip */ }
        }
      }
    }

    if (result) {
      const { proposals, kqs } = scoringToFrontend(result, friend, company);
      if (proposals.length > 0) {
        if (!DELTA_PROPOSALS[friend]) DELTA_PROPOSALS[friend] = {};
        DELTA_PROPOSALS[friend][company] = proposals;
        proposals.forEach(p => { if (p.confidence >= 80) p.status = 'applied'; });
        LEAGUE_TABLE_DATA[friend] = buildLeagueTable(friend);
      }
      if (kqs.length > 0 && COMPANY_STATUS[friend]?.[company]) {
        COMPANY_STATUS[friend][company].keyQuestions = kqs;
      }
      renderCurrentView();
      return { ok: true, stats: { signals: proposals.length, kqs: kqs.length } };
    }
    return { ok: false, error: 'No result from generation' };
