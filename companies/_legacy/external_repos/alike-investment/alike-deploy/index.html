async function loadDimAnalysis(dim, friend, company) {
  const cacheKey = `${friend}_${company}_${dim}`;
  const el = document.getElementById('dimAnalysis');

  // 1. Check in-memory cache first
  if (DIM_ANALYSIS_CACHE[cacheKey]) {
    if (el) el.innerHTML = DIM_ANALYSIS_CACHE[cacheKey];
    return;
  }

  const d = DIMENSIONS[dim];
  const slug = VAULT_SLUGS[company] || company;
  const baseline = WINNER_PATTERNS[friend]?.baselines?.[dim];
  const candidate = CANDIDATE_SCORES[friend]?.[company];
  const score = candidate?.[dim] || '?';
  const matchPct = baseline ? Math.round((score / baseline.score) * 100) : 0;

  // 2. Check vault cache via API
  try {
    const vaultResp = await fetch(COWORK_API + `/api/dim-analysis/${slug}/${dim}`);
    if (vaultResp.ok) {
      const vaultData = await vaultResp.json();
      if (vaultData.ok && vaultData.data && !vaultData.data.stale) {
        const rendered = renderMarkdown(vaultData.data.analysis);
        if (el) el.innerHTML = rendered;
        DIM_ANALYSIS_CACHE[cacheKey] = rendered;
        return;
      }
    }
  } catch (e) { /* vault miss, proceed to generate */ }

  // 3. Generate via AI API, then save to vault
  try {
    const el = document.getElementById('dimAnalysis');
    if (!el) return;

    const resp = await fetch(COWORK_API + '/api/cowork/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        company: slug,
        friend,
        message: `请详细解释为什么${company}的${d.short}（${d.name}）打分是${score}/5。

要求：
1. 基于vault里的研究材料，列出3-5条具体证据（引用具体事件、数据、人物发言）
2. 每条证据说明它支持哪个分数段（5分/4分/3分）
3. 与${friend}的基准(${baseline?.score}/5)对比，解释匹配度${matchPct}%的原因
4. 指出当前打分的不确定性和可能需要更新的地方
5. 用markdown格式，具体、有数据支撑`,
        history: [],
        projectMemory: '',
      }),
    });

    if (!resp.ok) { el.innerHTML = '(API不可用)'; return; }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: [DONE]')) continue;
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) { fullText += data.text; el.innerHTML = renderMarkdown(fullText); }
          } catch (e) {}
        }
      }
    }
    if (fullText) {
      const rendered = renderMarkdown(fullText);
      el.innerHTML = rendered;
      DIM_ANALYSIS_CACHE[cacheKey] = rendered;

      // Save to vault for persistence
      try {
        await fetch(COWORK_API + `/api/dim-analysis/${slug}/${dim}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            analysis: fullText,
            friend,
            score,
            baseline: baseline?.score,
            match_pct: matchPct,
          }),
        });
      } catch (e) { /* save failed silently */ }
    }
  } catch (e) {
    const el = document.getElementById('dimAnalysis');
    if (el) el.innerHTML = `(分析加载失败: ${e.message})`;
  }
}

// ===== Score Breakdown Modal =====
function showScoreBreakdown(friendName, companyName) {
  const pattern = WINNER_PATTERNS[friendName];
  const candidate = CANDIDATE_SCORES[friendName]?.[companyName];
  const result = computeAlikeScore(friendName, companyName);
  if (!pattern || !candidate || !result) return;

  const { alikeScore, breakdown, weights } = result;
  const scoreClass = alikeScore >= 80 ? 'high' : alikeScore >= 60 ? 'medium' : 'low';

  // Compute raw weight values for display
  const rawWeights = {};
  let rawTotal = 0;
  for (const [dim, info] of Object.entries(pattern.baselines)) {
    const key = `${info.causalRole}_${info.diagnosticPower}`;
    rawWeights[dim] = WEIGHT_MULTIPLIERS[key] || 1.0;
    rawTotal += rawWeights[dim];
  }

  // Identify strongest/weakest dims
  const sorted = [...breakdown].sort((a, b) => b.matchRate - a.matchRate);
  const strongest = sorted[0];
  const weakest = sorted[sorted.length - 1];
  const spineMatch = breakdown.filter(b => pattern.causalSpine.includes(b.dim));
  const avgSpineMatch = spineMatch.length ? Math.round(spineMatch.reduce((s, b) => s + b.matchRate, 0) / spineMatch.length * 100) : 0;

  // Causal role labels
  const roleLabel = { spine: '脊柱', flywheel: '飞轮', support: '支撑' };
  const powerLabel = { signature: '标志性', common: '通用', confirming: '确认性' };

  let html = `<div class="score-modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="score-modal" style="width:620px;max-height:90vh;overflow-y:auto;">
      <button class="score-modal-close" onclick="this.closest('.score-modal-overlay').remove()">✕</button>

// ===== Delta Detail Modal =====
function showDeltaDetail(friendName, companyName) {
  const deltaInfo = computeDelta(friendName, companyName);
  if (!deltaInfo) return;

  // Get all applied signals with their individual dims
  let appliedSignals = [];
  try {
    appliedSignals = getProposalsForCompany(friendName, companyName)
      .filter(p => p.autoStatus === 'auto-applied');
  } catch(e) {}

  const deltaColor = deltaInfo.delta > 0 ? '#16a34a' : deltaInfo.delta < 0 ? '#ef4444' : 'var(--text-tertiary)';

  let html = `<div class="score-modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="score-modal" style="width:560px;">
      <button class="score-modal-close" onclick="this.closest('.score-modal-overlay').remove()">✕</button>
      <h2 style="display:flex;align-items:center;gap:12px;">
        <span>Δ 组织趋势 — ${companyName}</span>
        <span style="color:${deltaColor};font-size:24px;">${deltaInfo.delta > 0 ? '+' : ''}${deltaInfo.delta}</span>
      </h2>
      <div class="modal-subtitle">${appliedSignals.length}条已生效Signal的加权累计</div>`;

  // Per-signal breakdown
  if (appliedSignals.length > 0) {
    appliedSignals.forEach((p, i) => {
      const dims = Object.entries(p.dims || {});
      const sigSum = dims.reduce((s, [, v]) => s + v, 0);
      const sigColor = sigSum >= 0 ? '#16a34a' : '#ef4444';
      html += `<div style="margin:${i === 0 ? '16' : '8'}px 0;padding:10px 12px;background:var(--bg);border-radius:8px;border-left:3px solid ${sigColor};">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:12px;font-weight:600;flex:1;line-height:1.4;">${p.signal.slice(0, 80)}${p.signal.length > 80 ? '...' : ''}</span>
          <span style="font-size:11px;color:var(--text-tertiary);">${p.confidence}%</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">`;
      dims.forEach(([dim, change]) => {
        html += `<span style="font-size:11px;padding:2px 8px;background:${change >= 0 ? '#dcfce7' : '#fef2f2'};border-radius:4px;color:${change >= 0 ? '#166534' : '#991b1b'};">${dim} ${change > 0 ? '+' : ''}${change}</span>`;
      });
      html += `</div></div>`;
    });
  } else {
    // Fallback for legacy DELTA_EVENTS
    html += `<div style="margin:16px 0;padding:10px 12px;background:var(--bg);border-radius:8px;">
      <div style="font-size:13px;">${deltaInfo.signal || '—'}</div>
    </div>`;
  }

  // Dimension breakdown with weight calculation
  const pattern = WINNER_PATTERNS[friendName];
  const rawWeightsD = {};
  let rawTotalD = 0;
  if (pattern) {
    for (const [dim, info] of Object.entries(pattern.baselines)) {
      const key = `${info.causalRole}_${info.diagnosticPower}`;
      rawWeightsD[dim] = WEIGHT_MULTIPLIERS[key] || 1.0;
      rawTotalD += rawWeightsD[dim];
    }
  }

  html += `<div style="margin-top:16px;font-size:13px;font-weight:600;margin-bottom:4px;">维度拆解 — 从Signal到Alike Score</div>`;
  html += `<div style="font-size:11px;color:var(--text-tertiary);margin-bottom:8px;">公式: Δ Alike = Σ( Δ匹配度_i × 权重_i × 100 )</div>`;
  html += `<table class="dim-table"><thead><tr>
    <th>维度</th><th>Signal变化</th><th>分数变化</th><th>匹配度变化</th><th>权重</th><th style="text-align:right;">Δ Alike</th>
  </tr></thead><tbody>`;

  let totalDelta = 0;
  deltaInfo.details.forEach(d => {
    const baseline = pattern?.baselines?.[d.dim]?.score || 5;
    const oldMatch = Math.min(d.oldScore / baseline, 1.0);
    const newMatch = Math.min(d.newScore / baseline, 1.0);
    const matchDelta = newMatch - oldMatch;
    const weight = rawTotalD > 0 ? (rawWeightsD[d.dim] || 1) / rawTotalD : 0;
    const alikeDelta = matchDelta * weight * 100;
    totalDelta += alikeDelta;
    const color = alikeDelta >= 0 ? '#16a34a' : '#ef4444';

    html += `<tr>
      <td><strong>${d.dim}</strong> <span style="font-size:10px;color:var(--text-tertiary);">${DIMENSIONS[d.dim]?.short?.replace(/^D\d\s*/, '') || ''}</span></td>
      <td style="color:${d.change >= 0 ? '#16a34a' : '#ef4444'};">${d.change > 0 ? '+' : ''}${d.change}</td>
      <td>${d.oldScore} → ${d.newScore}</td>
      <td>${(oldMatch * 100).toFixed(0)}% → ${(newMatch * 100).toFixed(0)}% <span style="color:${color};">(${matchDelta > 0 ? '+' : ''}${(matchDelta * 100).toFixed(1)}%)</span></td>
      <td>${(weight * 100).toFixed(0)}%</td>
      <td style="text-align:right;font-weight:600;color:${color};">${alikeDelta > 0 ? '+' : ''}${alikeDelta.toFixed(1)}</td>
    </tr>`;
  });

  html += `<tr style="border-top:2px solid var(--border);">
    <td colspan="5" style="font-weight:700;">Δ 组织趋势 (对Alike Score的影响)</td>
    <td style="text-align:right;font-weight:700;font-size:16px;color:${deltaColor};">${totalDelta > 0 ? '+' : ''}${totalDelta.toFixed(1)}</td>
  </tr></tbody></table>`;

  html += `</div></div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function getTimeline(researchId, company) {
  if (!coworkTimeline[researchId]) coworkTimeline[researchId] = {};

  if (!coworkTimeline[researchId][key]) coworkTimeline[researchId][key] = [];
  return coworkTimeline[researchId][key];
}

function getActiveTimeline() {
  return getTimeline(selectedResearch, coworkCompany);
}

function addToTimeline(researchId, msg) {
  const key = msg.company || coworkCompany || '_general';
  if (!coworkTimeline[researchId]) coworkTimeline[researchId] = {};
  if (!coworkTimeline[researchId][key]) coworkTimeline[researchId][key] = [];
  const tl = coworkTimeline[researchId][key];
  msg.id = msg.id || `msg_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
  msg.ts = msg.ts || Date.now();

// === Claude Code injection: push messages from CLI to frontend ===
window.injectCowork = function(userText, aiText, company) {
  if (!selectedResearch) return 'No research selected';
  const rawComp = company || coworkCompany || '_general';
  const comp = (rawComp === 'General' || rawComp === 'general') ? '_general' : rawComp;
  // Add user message
  addToTimeline(selectedResearch, { type: 'chat', role: 'user', text: userText, rawText: userText, company: comp });
  // Add AI response (markdown rendered)
  addToTimeline(selectedResearch, { type: 'chat', role: 'ai', text: renderMarkdown(aiText), rawText: aiText, company: comp, sources: ['Claude MAX'] });
  renderCoworkTab(true);
  persistAll();
  // Auto-scroll to bottom
  setTimeout(() => { const s = document.querySelector('.cowork-scroll'); if (s) s.scrollTop = s.scrollHeight; }, 50);
  return 'OK: injected to ' + comp;
};

// Migration: convert old flat array format to per-company
function migrateTimeline(data) {
  const migrated = {};
  for (const [researchId, val] of Object.entries(data)) {
    if (Array.isArray(val)) {
      migrated[researchId] = { _general: [] };
      for (const msg of val) {
        const key = msg.company || '_general';
        if (!migrated[researchId][key]) migrated[researchId][key] = [];
        migrated[researchId][key].push(msg);
      }
    } else if (val && typeof val === 'object') {
      migrated[researchId] = val;
    }
  }
  return migrated;
}

// Get all companies that have cowork messages for a research
function getCoworkCompanies(researchId) {
  const data = coworkTimeline[researchId];
  if (!data) return [];
  return Object.keys(data).filter(k => k !== '_general' && data[k].length > 0);
}

function renderCoworkTab(preserveScroll) {
  const research = RESEARCHES.find(r => r.id === selectedResearch);

  // Render timeline with limit

  renderCoworkQuickActions(actions, research);

function renderCoworkCompanyPills(el, research) {
  if (!el) return;
  const friend = research.friend || '';
  const leagueData = LEAGUE_TABLE_DATA[friend] || [];
  const companiesWithData = getCoworkCompanies(selectedResearch);

  // Global cowork: no pills needed (or only show companies with history)
  if (!friend) {
    if (companiesWithData.length === 0) { el.innerHTML = ''; return; }
    let html = `<div class="cowork-pill ${!coworkCompany ? 'active' : ''}" onclick="switchCoworkCompany(null)">General</div>`;
    companiesWithData.forEach(company => {
      html += `<div class="cowork-pill ${coworkCompany === company ? 'active' : ''}" onclick="switchCoworkCompany('${company.replace(/'/g, "\\'")}')">${company}</div>`;
    });
    el.innerHTML = html;
    return;
  }

  // Research-specific pills — ordered by league table rank
  let html = `<div class="cowork-pill ${!coworkCompany ? 'active' : ''}" onclick="switchCoworkCompany(null)">General</div>`;

  // Build ranked list: league table order first, then others
  const ranked = leagueData.map((d, i) => ({ company: d.company, rank: i + 1, score: d.alikeScore || 0 }));
  const rankedNames = ranked.map(r => r.company);
  const unranked = companiesWithData.filter(c => !rankedNames.includes(c));
  const allOrdered = [...ranked, ...unranked.map(c => ({ company: c, rank: 0, score: 0 }))];

  allOrdered.forEach(({ company, rank, score }) => {
    const isActive = coworkCompany === company;
    const hasData = companiesWithData.includes(company);
    const proposals = getProposalsForCompany(friend, company);
    const hasSignals = proposals.length > 0;
    const pendingSignals = proposals.filter(p => p.autoStatus !== 'auto-applied').length;
    const rankLabel = rank > 0 ? `<span style="font-size:9px;color:var(--text-tertiary);font-weight:400;">#${rank}</span>` : '';
    html += `<div class="cowork-pill ${isActive ? 'active' : ''}" onclick="switchCoworkCompany('${company.replace(/'/g, "\\'")}')">${rankLabel} ${company}</div>`;
  });

  el.innerHTML = html;
}

function switchCoworkCompany(company) {
  coworkCompany = company;
  statusCompany = company;
  coworkLoadOffset = 0;
  expandedCoworkItem = null;
  // Auto-seed signals/KQs into company timeline on first visit
  renderCoworkTab();
}

// Auto-detect if user's chat mentions signals/KQs and trigger relevant cards
function autoTriggerCards(userText, friend, company) {
  const lowerText = userText.toLowerCase();
  const proposals = getProposalsForCompany(friend, company);
  const companyData = COMPANY_STATUS[friend]?.[company];
  const kqs = companyData?.keyQuestions || [];
  const tl = getTimeline(selectedResearch, company);

  // Check if user mentions signal-related keywords
  const sigKeywords = ['signal', '信号', 'delta', '置信度', 'confidence', 'triangulate', '三角'];
  const kqKeywords = ['question', '问题', 'KQ', 'key question', '关键问题', '验证', 'resolve'];

  const mentionsSignal = sigKeywords.some(k => lowerText.includes(k));
  const mentionsKQ = kqKeywords.some(k => lowerText.includes(k));

  // Try to match specific signal by keyword overlap
  if (mentionsSignal || /看看|分析|展开|work on|聊聊/.test(lowerText)) {
    for (const p of proposals) {
      const sigWords = p.signal.toLowerCase().split(/[\s，。、]+/).filter(w => w.length > 2);
      const matchCount = sigWords.filter(w => lowerText.includes(w)).length;
      if (matchCount >= 2) {
        const exists = tl.find(m => m.type === 'signal' && m.signalId === p.id);
        if (!exists) {
          triggerSignalCard(company, p.id);
          return; // Only trigger one card per message
        }
      }
    }
  }

  // Try to match specific KQ
  if (mentionsKQ || /看看|问题|进展|怎么样/.test(lowerText)) {
    for (const kq of kqs) {
      const kqWords = kq.question.toLowerCase().split(/[\s，。、？?]+/).filter(w => w.length > 2);
      const matchCount = kqWords.filter(w => lowerText.includes(w)).length;
      if (matchCount >= 2) {
        const exists = tl.find(m => m.type === 'kq' && m.kqId === kq.id);
        if (!exists) {
          triggerKQCard(company, kq.id);
          return;
        }
      }
    }
  }
}

// Insert a signal card into cowork timeline as a triggered action (from Status click or chat mention)
// expand: true = auto-expand (from Status click), false = collapsed (from chat trigger)
function triggerSignalCard(company, signalId, expand = false) {
  const research = RESEARCHES.find(r => r.id === selectedResearch);
  if (!research) return;
  const proposal = findProposalById(research.friend, signalId);
  if (!proposal) return;
  if (!proposal.triangulate) generateTriangulate(proposal, company, research.friend);
  addToTimeline(selectedResearch, {
    type: 'signal', role: 'ai', signalId, company,
    summary: proposal.signal, dims: Object.keys(proposal.dims).join('+'),
    confidence: proposal.confidence,
  });
  if (expand) expandedCoworkItem = { type: 'signal', id: signalId };
}

// Insert a KQ card into cowork timeline as a triggered action
function triggerKQCard(company, kqId, expand = false) {
  addToTimeline(selectedResearch, {
    type: 'kq', role: 'ai', kqId, company,
    summary: findKQById(RESEARCHES.find(r => r.id === selectedResearch)?.friend, kqId)?.question || '',
  });

}

function renderTimelineMsg(msg, research) {
  const friend = research.friend;

  // User message
  if (msg.role === 'user') {
    return `<div class="cowork-msg user">${msg.text}</div>`;
  }

  // AI chat response (with sources)
  if (msg.type === 'chat' && msg.role === 'ai') {
    let html = `<div class="cowork-msg ai">${msg.text}`;
    if (msg.sources && msg.sources.length > 0) {
      html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-tertiary);">
        📎 ${msg.sources.map(s => `<span style="margin-right:8px;">${s}</span>`).join('')}
      </div>`;
    }
    html += `</div>`;
    return html;
  }

  // Signal card (small or expanded)
  if (msg.type === 'signal') {
    const isExpanded = expandedCoworkItem?.type === 'signal' && expandedCoworkItem?.id === msg.signalId
      && (!expandedCoworkItem.msgId || expandedCoworkItem.msgId === msg.id);
    if (isExpanded) {
      return `<div id="msg_${msg.id}">${renderSignalExpanded(msg, friend)}</div>`;
    }
    return renderSignalCard(msg, friend);
  }

  // Key Question card (small or expanded)
  if (msg.type === 'kq') {
    const isExpanded = expandedCoworkItem?.type === 'kq' && expandedCoworkItem?.id === msg.kqId
      && (!expandedCoworkItem.msgId || expandedCoworkItem.msgId === msg.id);
    if (isExpanded) {
      return renderKQExpanded(msg, friend);
    }
    return renderCoworkKQCard(msg, friend);
  }

  // Agent message (in expanded context)
  if (msg.role === 'agent') {
    const agent = AGENTS.find(a => a.id === msg.agentId) || { emoji: '🤖', name: msg.agentId || 'System' };
    const deltaClass = (msg.confidenceDelta || 0) >= 0 ? 'pos' : 'neg';
    const deltaStr = msg.confidenceDelta ? `<span class="agent-debate-conf-delta ${deltaClass}">${msg.confidenceDelta > 0 ? '+' : ''}${msg.confidenceDelta}%</span>` : '';
    return `<div class="agent-debate-card">
      <div class="agent-debate-header">
        <span class="agent-debate-emoji">${agent.emoji}</span>
        <span class="agent-debate-name">${agent.name}</span>
        ${deltaStr}
      </div>
      <div class="agent-debate-body">${msg.body}</div>
    </div>`;
  }

  // Synthesis message
  if (msg.role === 'synthesis' || msg.type === 'synthesis') {
    const confColor = (msg.totalConfidence || 0) >= 80 ? '#16a34a' : (msg.totalConfidence || 0) >= 50 ? '#d97706' : '#ef4444';
    return `<div class="synthesis-card">
      <p>${msg.body}</p>
      ${msg.totalConfidence ? `<div style="margin-top:6px;font-size:12px;color:var(--text-secondary);">Confidence: <strong style="color:${confColor};">${msg.totalConfidence}%</strong></div>` : ''}
    </div>`;
  }

  // AI system message
  if (msg.role === 'ai' || msg.type === 'system-msg') {
    return `<div class="cowork-msg ai">${msg.text || msg.body}</div>`;
  }

  // Fallback
  return `<div class="cowork-msg ai">${msg.text || msg.body || ''}</div>`;
}

// ===== Signal Cards =====
function renderSignalCard(msg, friend) {
  const proposal = findProposalById(friend, msg.signalId);
  const conf = proposal?.confidence || msg.confidence || 0;
  const confColor = conf >= 80 ? '#16a34a' : conf >= 50 ? '#d97706' : '#ef4444';
  const applied = proposal?.autoStatus === 'auto-applied';
  const isStale = proposal?.stale === true;
  const eventDate = proposal?.event_date || '';
  const staleStyle = isStale ? 'opacity:0.45;text-decoration:line-through;' : '';
  return `<div class="cowork-signal-card ${applied ? 'applied' : ''}" id="msg_${msg.id}" onclick="expandCoworkItem('signal','${msg.signalId}','${msg.id}')" style="${staleStyle}">
    <div style="display:flex;align-items:center;gap:8px;">
      ${eventDate ? `<span style="font-size:10px;color:var(--text-tertiary);flex-shrink:0;">${eventDate.slice(5)}</span>` : ''}
      <span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${msg.summary || proposal?.signal || ''}${isStale ? ' <span style="font-size:10px;color:var(--text-tertiary);">[已过时]</span>' : ''}</span>
      <span style="font-size:12px;font-weight:700;color:${isStale ? 'var(--text-tertiary)' : confColor};flex-shrink:0;">${conf}%</span>
      <span style="font-size:11px;color:var(--text-tertiary);flex-shrink:0;">▼</span>
    </div>
  </div>`;
}

function renderSignalExpanded(msg, friend) {
  const proposal = findProposalById(friend, msg.signalId);

  const confColor = conf >= 80 ? '#16a34a' : conf >= 50 ? '#d97706' : '#ef4444';

  const srcType = proposal.bestSource || classifySource((proposal.source || '') + ' ' + (proposal.signal || ''));

    html += `<div style="margin:8px 0;padding:10px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;">`;
    html += `<div style="font-size:11px;font-weight:600;color:var(--text-tertiary);margin-bottom:6px;">📋 已收集证据 (${proposal.evidences.length}条)</div>`;
    proposal.evidences.forEach(e => {
      const eSrc = SOURCE_CREDIBILITY[e.sourceType]?.label || e.sourceType;
      html += `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border-light);line-height:1.5;">
        <span style="font-size:10px;padding:1px 6px;background:#f0f4ff;border-radius:6px;color:#3b5998;margin-right:4px;">${eSrc}</span>
        ${e.addedBy === 'human' ? '<span style="font-size:10px;padding:1px 6px;background:#fef2f2;border-radius:6px;color:#ef4444;margin-right:4px;">你提供</span>' : ''}
        ${e.text.slice(0, 120)}${e.text.length > 120 ? '...' : ''}

    });
    html += `</div>`;
  }

  html += `<div style="margin:8px 0;padding:10px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;">`;
  html += `<div style="font-size:11px;font-weight:600;color:var(--text-tertiary);margin-bottom:6px;">📊 影响维度</div>`;
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;">`;
  Object.entries(proposal.dims).forEach(([dim, change]) => {

    const score = candidate ? candidate[dim] : '?';

    const dimShort = DIMENSIONS[dim]?.short || dim;
    // Strip dim code prefix if present to avoid duplication (e.g., "D3 考核激励" → "考核激励")
    const dimLabel = dimShort.startsWith(dim + ' ') ? dimShort.slice(dim.length + 1) : dimShort;

      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">

    // Pattern Matching
    html += `<div style="margin:8px 0;padding:10px 12px;background:${tri.pattern?.match ? '#f0fdf4' : '#fffbeb'};border-radius:8px;border:1px solid ${tri.pattern?.match ? '#bbf7d0' : '#fde68a'};">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
        <span style="font-size:12px;">🧩</span><span style="font-size:12px;font-weight:600;">Pattern Matching</span>
        <span style="font-size:11px;color:${tri.pattern?.match ? '#16a34a' : '#d97706'};font-weight:700;">${tri.pattern?.match ? '✓ MATCH' : '~ PARTIAL'}</span>
      </div>`;
    (tri.pattern?.points || []).forEach(p => { html += `<div style="font-size:12px;padding:2px 0;color:var(--text-secondary);line-height:1.5;">• ${p}</div>`; });
    html += `</div>`;

    // Adversarial
    const advBg = tri.adversarial?.holes === 0 ? '#f0fdf4' : tri.adversarial?.holes <= 1 ? '#fffbeb' : '#fef2f2';
    const advBd = tri.adversarial?.holes === 0 ? '#bbf7d0' : tri.adversarial?.holes <= 1 ? '#fde68a' : '#fecaca';

  html += `<div style="margin-top:16px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;">3. Your Turn — 你的判断 / 你应该去做</div>`;

  // Generate specific, actionable todos based on signal content
  const todos = generateSignalTodos(proposal, tri, company, friend, conf, applied);

    const priorityLabel = todo.priority === 'high' ? '必做' : todo.priority === 'medium' ? '建议' : '可选';
    html += `<div style="margin:6px 0;padding:8px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;font-size:12px;line-height:1.5;">

      </div>
      <div style="color:var(--text-secondary);">${todo.detail}</div>
    </div>`;
  });
  html += `</div>`;

  html += `</div>`;
  return html;
}

function generateSignalTodos(proposal, tri, company, friend, conf, applied) {
  const todos = [];
  const signal = proposal.signal || '';
  const dims = Object.keys(proposal.dims || {});
  const srcType = proposal.bestSource || classifySource((proposal.source || '') + ' ' + signal);

  // 1. Missing evidence → specific data collection tasks
  if (tri?.evidence?.missing?.length > 0) {
    tri.evidence.missing.forEach(m => {
      const cleanM = m.replace(/<[^>]*>/g, '');
      todos.push({
        priority: 'high',
        action: `获取缺失数据`,
        detail: cleanM.length > 80 ? cleanM : `${cleanM}。这是提升置信度最直接的方式。`
      });
    });
  }

  // 2. Low source credibility → upgrade source
  if (srcType === 'S1' || srcType === 'S2') {
    todos.push({
      priority: 'high',
      action: `升级信源等级（当前${srcType}）`,
      detail: `当前信源是${SOURCE_CREDIBILITY[srcType]?.label || '低等级'}。去找一手信源验证：联系${company}的前/现员工、查SEC filing、找IR公告，或在Glassdoor/LinkedIn上交叉验证。`
    });
  } else if (srcType === 'S3') {
    todos.push({
      priority: 'medium',
      action: `寻找独立信源交叉验证`,
      detail: `当前信源是公开报道(S3)，找至少一个独立来源（如另一家媒体的报道、行业分析师观点、或产品端直接验证）来确认事实。`
    });
  }

  // 3. Adversarial holes → specific investigation
  if (tri?.adversarial?.holes > 0) {
    const holePoints = (tri.adversarial.points || []).filter(p =>
      !p.includes('反驳') && !p.includes('当前评估')
    );
    if (holePoints.length > 0) {
      const cleanHole = holePoints[0].replace(/<[^>]*>/g, '').replace(/^漏洞[:：]?\s*/, '');
      todos.push({
        priority: 'high',
        action: `回应对抗性质疑`,
        detail: `AI发现的漏洞："${cleanHole.slice(0, 120)}"。你需要找到数据或事实来反驳或确认这个漏洞。`
      });
    }
  }

  // 4. Dimension-specific actions
  dims.forEach(d => {
    const dimName = DIMENSIONS[d]?.short || d;
    const baseline = WINNER_PATTERNS[friend]?.baselines?.[d];
    const cs = CANDIDATE_SCORES[friend]?.[company]?.[d];
    if (baseline && cs && cs < baseline.score) {
      const gap = (baseline.score - cs).toFixed(1);
      if (d === 'D1') {
        todos.push({ priority: 'medium', action: `验证${company} CEO的认知深度`, detail: `${dimName}当前${cs}/5，距${friend}基准差${gap}分。去找CEO近期的访谈/播客/演讲，判断他的战略思维是独特洞察还是行业共识。` });
      } else if (d === 'D3') {
        todos.push({ priority: 'medium', action: `调研${company}的绩效考核机制`, detail: `${dimName}当前${cs}/5。去Glassdoor/Blind/脉脉上看员工对考核制度的评价，或找内部人了解OKR/KPI的实际执行方式。` });
      } else if (d === 'D5') {
        todos.push({ priority: 'medium', action: `评估${company}的组织效率`, detail: `${dimName}当前${cs}/5。计算人效（收入/员工数），对比${friend}和行业平均。查是否有自动化/AI工具在内部使用的证据。` });
      } else if (d === 'D6') {
        todos.push({ priority: 'medium', action: `调查${company}的人才密度`, detail: `${dimName}当前${cs}/5。在LinkedIn查核心团队背景，看Glassdoor评分趋势，了解近期关键人才的进出。` });
      } else if (d === 'D7') {
        todos.push({ priority: 'medium', action: `验证${company}的核心战略赌注`, detail: `${dimName}当前${cs}/5。CEO说的Key Bet是什么？是否有资源（资金/人力/组织变革）实际投入？还是只是口号？` });
      }
    }
  });

  // 5. Product verification (if signal mentions product)
  if (/产品|上线|launch|发布|功能|feature|app/i.test(signal)) {
    todos.push({
      priority: 'medium',
      action: `亲自体验产品`,
      detail: `信号涉及产品变化。下载/打开${company}的产品，亲自验证信号中提到的功能是否真实存在、体验如何。一手产品体验是最强的S5级证据。`
    });
  }

  // 6. If already applied, suggest monitoring
  if (applied) {
    todos.push({
      priority: 'low',
      action: `持续监控`,
      detail: `信号已生效，但需要持续关注：下一季度财报是否验证这个趋势？竞对是否有类似动作？设一个日历提醒在关键时间节点review。`
    });
  }

  // Limit to top 4 most important
  return todos.slice(0, 4);
}

function generateKQTodos(kq, company, friend) {
  const todos = [];
  const q = kq.question || '';
  const hasAnswer = !!(kq.evolvingAnswer || kq.answer?.title);
  const resolveBy = kq.resolves_by || kq.resolveBy || '';

  // 1. Data-specific actions based on question content
  // Check if vault has data for this company (skip "go fetch" if data exists)
  const hasVaultData = !!VAULT_SLUGS[company];

  if (/DAU|MAU|用户|增长率|留存|churn|retention/i.test(q)) {
    todos.push({
      priority: hasVaultData ? 'medium' : 'high',
      action: hasVaultData ? `验证${company}用户数据是否最新` : `获取${company}最新用户数据`,
      detail: hasVaultData
        ? `Vault里已有历史用户数据。检查是否有最新季度更新（Q1 2026），如有差异则补充到证据链。`
        : `查SEC filing/IR页面的最新季度数据，或使用SensorTower/data.ai等第三方工具获取MAU/DAU趋势。`
    });
  }
  if (/收入|revenue|营收|利润|margin|EBITDA|盈利/i.test(q)) {
    todos.push({
      priority: hasVaultData ? 'medium' : 'high',
      action: hasVaultData ? `检查${company}财务数据是否有更新` : `拉取${company}财务数据`,
      detail: hasVaultData
        ? `Vault里已有财务数据。重点看：最新季度是否已发布、关键指标（增速/毛利率/杠杆）是否有变化。有变化则更新证据链。`
        : `在SEC EDGAR或公司IR页面找最新季度报告。重点看：收入增速趋势、毛利率变化、经营杠杆。`
    });
  }
  if (/AI|人工智能|模型|算法|自动化/i.test(q)) {
    todos.push({
      priority: 'high',
      action: `亲自验证${company}的AI落地`,
      detail: `三条路径：①亲自用产品，看AI功能是否真实可体验；②查GitHub/技术博客；③找${company}工程师/PM了解AI在内部的真实使用程度。这是只有人能做的事。`
    });
  }
  if (/组织|团队|文化|员工|人才|招聘|裁员/i.test(q)) {
    todos.push({
      priority: 'high',
      action: `找${company}内部人聊组织健康度`,
      detail: `AI能查公开信息（Glassdoor/LinkedIn），但真正的组织洞察需要一手对话。找在职员工、前员工、合作伙伴聊天，了解管理层真实风格和团队士气。`
    });
  }
  if (/CEO|创始人|管理层|领导/i.test(q)) {
    todos.push({
      priority: 'medium',
      action: `关注CEO近期公开场合表态`,
      detail: `查最近3个月的播客、会议演讲、Twitter/X。重点：对这个问题的直接回应，说法是否前后一致。`
    });
  }
  if (/竞对|竞争|market share|份额|对手/i.test(q)) {
    todos.push({
      priority: 'medium',
      action: `和竞对做对比分析`,
      detail: `列出3个直接竞对，对比同一指标。区分是公司alpha还是行业beta。${hasVaultData ? 'Vault里有competitive数据可参考。' : ''}`
    });
  }

  // 2. If question has no answer yet
  if (!hasAnswer) {
    todos.push({
      priority: 'high',
      action: `先给出你的初步判断`,
      detail: `AI还没有分析这个问题。先在下方输入你的直觉判断（哪怕不确定），AI会帮你找证据验证或反驳。人的直觉是研究方向的输入。`
    });
  }

  // 3. Time-sensitive
  if (resolveBy) {
    todos.push({
      priority: 'medium',
      action: `设置${resolveBy}提醒`,
      detail: `这个问题的验证窗口是${resolveBy}。在日历上设一个提醒，届时回来review答案是否成立。`
    });
  }

  // 4. Generic fallback if no specific todos generated
  if (todos.length === 0) {
    todos.push({
      priority: 'medium',
      action: `找一个能回答这个问题的人`,
      detail: `这个问题最快的解决方式是找到一个内部人或行业专家直接问。在LinkedIn搜${company}的前/现员工，约一个30分钟的电话。`
    });
    todos.push({
      priority: 'low',
      action: `搜索公开信息`,
      detail: `用"${company} + ${q.slice(0,20)}"搜索。优先看：公司官方博客、CEO访谈、行业分析报告、Reddit/HackerNews讨论。`
    });
  }

  return todos.slice(0, 3);
}

// ===== Key Question Cards (Cowork Timeline) =====
function renderCoworkKQCard(msg, friend) {
  const kq = findKQById(friend, msg.kqId);
  const authorTag = kq?.author === 'ai' ? 'AI' : kq?.author === 'human' ? 'Human' : 'AI+Human';
  return `<div class="cowork-kq-card" id="msg_${msg.id}" onclick="expandCoworkItem('kq','${msg.kqId}','${msg.id}')">
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${msg.summary || kq?.question || ''}</span>
      <span class="kq-author-tag ${kq?.author || 'ai'}" style="font-size:10px;flex-shrink:0;">${authorTag}</span>
      <span style="font-size:11px;color:var(--text-tertiary);flex-shrink:0;">▼</span>
    </div>
    ${(kq?.evolvingAnswer || kq?.answer?.title) ? `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(kq.evolvingAnswer || kq.answer.title).slice(0,80)}...</div>` : ''}
  </div>`;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderEvidenceItem(e) {
  const srcIcon = e.source === 'human' ? '👤' : e.source === 'ai_scan' ? '🔍' : '🤖';
  const srcLabel = e.source === 'human' ? '你提供' : e.source === 'ai_scan' ? '轻扫发现' : 'AI分析';
  const impactColor = e.impact === 'positive' ? '#16a34a' : e.impact === 'negative' ? '#ef4444' : 'var(--text-tertiary)';
  return `<div style="padding:6px 10px;margin:3px 0;background:var(--bg-white);border-left:3px solid ${impactColor};border-radius:0 6px 6px 0;font-size:12px;">
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:2px;">
      <span style="color:var(--text-tertiary);font-size:10px;">${e.date}</span>
      <span style="font-size:11px;">${srcIcon} ${srcLabel}</span>
      ${e.linked_metric ? `<span style="font-size:10px;padding:1px 5px;background:#f0f4ff;border-radius:4px;color:#3b5998;">📊 ${e.linked_metric}</span>` : ''}
    </div>
    <div style="line-height:1.5;color:var(--text-secondary);">${e.content}</div>
  </div>`;
}

function renderKQExpanded(msg, friend) {
  const kq = findKQById(friend, msg.kqId);
  if (!kq) return renderCoworkKQCard(msg, friend);
  const authorTag = kq.author === 'ai' ? 'AI' : kq.author === 'human' ? 'Human' : 'AI+Human';
  const company = msg.company || kq.company || '';

  let html = `<div class="cowork-expanded-card">`;

  // Header
  html += `<div class="expanded-card-header">
    <span style="font-size:14px;font-weight:600;flex:1;line-height:1.4;">❓ ${escHtml(kq.question)}</span>
    <span class="kq-author-tag ${kq.author}" style="font-size:10px;">${authorTag}</span>
    <span class="expanded-card-close" onclick="event.stopPropagation();collapseCoworkItem()">✕</span>
  </div>`;
  if (company) {
    html += `<div style="margin:4px 0;"><span style="font-size:11px;padding:2px 8px;background:var(--bg);border-radius:10px;font-weight:600;">${company}</span></div>`;
  }

  // ═══ SECTION 1: CONTEXT — 我们已经知道什么 ═══
  html += `<div style="margin-top:12px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;">1. Context — 已知信息</div>`;

  // Sources consulted
  if (kq.sources?.length > 0) {
    const srcLabels = kq.sources.map(s => typeof s === 'string' ? s : (s.name || s.label || JSON.stringify(s)));
    html += `<div style="margin:8px 0;padding:8px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;">
      <div style="font-size:11px;font-weight:600;color:var(--text-tertiary);margin-bottom:4px;">📎 已参考来源</div>
      <div style="font-size:12px;color:var(--text-secondary);">${srcLabels.join(' · ')}</div>
    </div>`;
  }

  // Related signals
  if (company && friend) {
    const relatedSignals = getProposalsForCompany(friend, company);
    const relevant = relatedSignals.filter(p => {
      const sigDims = Object.keys(p.dims);
      return sigDims.some(d => kq.question.includes(d) || kq.question.includes(DIMENSIONS[d]?.short || ''));
    }).slice(0, 3);
    if (relevant.length > 0) {
      html += `<div style="margin:8px 0;padding:8px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;">
        <div style="font-size:11px;font-weight:600;color:var(--text-tertiary);margin-bottom:4px;">📡 相关信号</div>`;
      relevant.forEach(p => {
        html += `<div style="font-size:11px;padding:3px 0;color:var(--text-secondary);">${p.signal.slice(0, 80)}... <span style="font-weight:600;">${p.confidence}%</span></div>`;
      });
      html += `</div>`;
    }
  }

  // Resolution timeline
  if (kq.resolves_by || kq.resolveBy) {
    html += `<div style="margin:8px 0;padding:8px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;">
      <div style="font-size:11px;font-weight:600;color:var(--text-tertiary);margin-bottom:4px;">⏰ 验证时间</div>
      <div style="font-size:12px;">${kq.resolves_by || kq.resolveBy}</div>
    </div>`;
  }

  // ═══ SECTION 2: AI ANALYSIS — AI分析 + 证据链 ═══
  const trail = kq.evidence_trail || kq.evidenceTrail || [];
  const answerText = kq.evolving_answer || kq.evolvingAnswer || kq.answer?.detail || kq.answer?.title || '';

  html += `<div style="margin-top:16px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;">2. AI Analysis — AI分析</div>`;

  if (answerText) {
    // AI synthesis — 过长自动折叠
    const ANSWER_FOLD = 300;
    const needFold = answerText.length > ANSWER_FOLD;
    html += `<div style="margin:8px 0;padding:10px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;">`;
    if (needFold) {
      const foldId = 'aiFold_' + (kq.id || Math.random().toString(36).slice(2));
      html += `<div id="${foldId}_short" style="font-size:13px;line-height:1.7;color:var(--text-primary);">${answerText.slice(0, ANSWER_FOLD).replace(/\n/g, '<br>')}... <span style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="document.getElementById('${foldId}_short').style.display='none';document.getElementById('${foldId}_full').style.display='block';">▼ 展开完整分析</span></div>`;
      html += `<div id="${foldId}_full" style="display:none;font-size:13px;line-height:1.7;color:var(--text-primary);">${answerText.replace(/\n/g, '<br>')} <span style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="document.getElementById('${foldId}_full').style.display='none';document.getElementById('${foldId}_short').style.display='block';">▲ 收起</span></div>`;
    } else {
      html += `<div style="font-size:13px;line-height:1.7;color:var(--text-primary);">${answerText.replace(/\n/g, '<br>')}</div>`;
    }
    html += `</div>`;
  } else {
    html += `<div style="margin:8px 0;padding:10px 12px;background:#fffbeb;border-radius:8px;font-size:12px;color:#92400e;">暂无AI分析。在下方输入新信息触发分析。</div>`;
  }

  // Evidence trail — 跳过ai_init（已在AI Analysis显示）
  const filteredTrail = trail.filter(e => e.source !== 'ai_init');
  if (filteredTrail.length > 0) {
    const FOLD_THRESHOLD = 3;
    const showAll = filteredTrail.length <= FOLD_THRESHOLD;
    const visibleTrail = showAll ? filteredTrail : filteredTrail.slice(-3);
    const hiddenCount = showAll ? 0 : filteredTrail.length - 3;

    html += `<div style="margin:8px 0;font-size:11px;font-weight:600;color:var(--text-tertiary);">证据链 (${filteredTrail.length}条)</div>`;

    if (!showAll) {
      html += `<details style="margin:4px 0;"><summary style="font-size:11px;color:var(--text-tertiary);cursor:pointer;">展开更早的 ${hiddenCount} 条</summary>`;
      filteredTrail.slice(0, hiddenCount).forEach(e => {
        html += renderEvidenceItem(e);
      });
      html += `</details>`;
    }
    visibleTrail.forEach(e => { html += renderEvidenceItem(e); });
  }

  // ═══ VERIFICATION METRICS — 验证方法 ═══
  const metrics = kq.verification_metrics || [];
  if (metrics.length > 0) {
    html += `<div style="margin-top:16px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;">📊 验证方法 — 追踪什么、多久看、怎么判</div>`;
    html += `<div style="margin:8px 0;overflow-x:auto;">
      <table style="width:100%;font-size:12px;border-collapse:collapse;">
        <thead><tr style="border-bottom:2px solid var(--border-light);text-align:left;">
          <th style="padding:6px 8px;font-weight:600;">指标</th>
          <th style="padding:6px 8px;font-weight:600;">频率</th>
          <th style="padding:6px 8px;font-weight:600;color:#16a34a;">🟢 绿灯</th>
          <th style="padding:6px 8px;font-weight:600;color:#ef4444;">🔴 红灯</th>
          <th style="padding:6px 8px;font-weight:600;">状态</th>
        </tr></thead><tbody>`;
    metrics.forEach(m => {
      const statusColor = m.current_status === '🟢' ? '#16a34a' : m.current_status === '🔴' ? '#ef4444' : 'var(--text-tertiary)';
      html += `<tr style="border-bottom:1px solid var(--border-light);">
        <td style="padding:6px 8px;font-weight:500;">${m.metric}</td>
        <td style="padding:6px 8px;color:var(--text-tertiary);">${m.frequency}</td>
        <td style="padding:6px 8px;color:#16a34a;font-size:11px;">${m.green_threshold}</td>
        <td style="padding:6px 8px;color:#ef4444;font-size:11px;">${m.red_threshold}</td>
        <td style="padding:6px 8px;color:${statusColor};font-weight:600;">${m.current_status || '未追踪'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // ═══ SECTION 3: YOUR TURN — 你的判断 / 你应该去做 ═══
  html += `<div style="margin-top:16px;font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;">3. Your Turn — 你的判断 / 你应该去做</div>`;

  const kqTodos = generateKQTodos(kq, company, friend);
  kqTodos.forEach(todo => {
    const priorityColor = todo.priority === 'high' ? '#ef4444' : todo.priority === 'medium' ? '#d97706' : '#6b7280';
    const priorityLabel = todo.priority === 'high' ? '必做' : todo.priority === 'medium' ? '建议' : '可选';
    html += `<div style="margin:6px 0;padding:8px 12px;background:var(--bg-white);border:1px solid var(--border-light);border-radius:8px;font-size:12px;line-height:1.5;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
        <span style="font-size:10px;padding:1px 6px;background:${priorityColor}15;color:${priorityColor};border-radius:4px;font-weight:600;">${priorityLabel}</span>
        <span style="font-weight:600;">${todo.action}</span>
      </div>
      <div style="color:var(--text-secondary);">${todo.detail}</div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

// ===== Expand/Collapse =====
function expandCoworkItem(type, id, msgId) {
  // Ensure the timeline has an entry for this item (e.g. when navigating from Status)
  if (coworkCompany) {
    const tl = getTimeline(selectedResearch, coworkCompany);
    const exists = tl.some(m => (type === 'signal' && m.signalId === id) || (type === 'kq' && m.kqId === id));
    if (!exists) {
      const entry = {
        id: Date.now(),
        type: type === 'signal' ? 'signal' : 'kq',
        company: coworkCompany,
        ts: new Date().toISOString(),
      };
      if (type === 'signal') entry.signalId = id;
      else entry.kqId = id;
      tl.push(entry);
      msgId = entry.id;
    }
  }
  expandedCoworkItem = { type, id, msgId };
  renderCoworkTab(true);
  setTimeout(() => {
    const target = msgId ? document.getElementById('msg_' + msgId) : document.querySelector('.cowork-expanded-card');
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function collapseCoworkItem() {
  expandedCoworkItem = null;
  renderCoworkTab(true);
}

// ===== Find helpers =====
function findProposalById(friend, id) {
  if (!DELTA_PROPOSALS[friend]) return null;
  for (const company in DELTA_PROPOSALS[friend]) {
    const found = DELTA_PROPOSALS[friend][company].find(p => p.id === id);
    if (found) return found;
  }
  return null;
}

function findKQById(friend, id) {
  // Search in COMPANY_STATUS data
  const statuses = COMPANY_STATUS[friend];
  if (!statuses) return null;
  for (const company in statuses) {
    const kqs = statuses[company]?.keyQuestions || [];
    const found = kqs.find(kq => kq.id === id);
    if (found) return found;
  }
  return null;
}

function handleCoworkSend() {
  const input = document.getElementById('coworkInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  handleCoworkInput(text);
}

function handleCoworkInput(text) {
  const research = RESEARCHES.find(r => r.id === selectedResearch);
  if (!research) return;
  const friend = research.friend;
  const company = coworkCompany || statusCompany || null;

  // Add user message to timeline
  addToTimeline(selectedResearch, { type: 'chat', role: 'user', text, company });

  // Detect mode based on context
  const mode = detectCoworkMode(text, friend, company);

  if (mode === 'url') {
    handleURLInput(text, friend, company);
  } else if (mode === 'cross-research') {
    handleCrossResearchQuery(text);
  } else if (mode === 'signal') {
    handleSignalInput(text, friend, company);
  } else if (mode === 'kq') {
    handleKQInput(text, friend, company);
  } else if (mode === 'evidence' && expandedCoworkItem?.type === 'signal') {
    handleEvidenceInput(text, friend, company, expandedCoworkItem.id);
  } else if (mode === 'kq-evidence' && expandedCoworkItem?.type === 'kq') {
    handleKQEvidenceInput(text, friend, company, expandedCoworkItem.id);
  } else {
    handleChatInput(text, friend, company);
  }

  renderCoworkTab();
}

function detectCoworkMode(text, friend, company) {
  // URL detection (highest priority)
  if (/https?:\/\/\S+/i.test(text)) return 'url';
  // Cross-research query
  if (/最像谁|像谁|在哪个研究|属于哪个|which research|在哪个.*table|排第几/i.test(text)) return 'cross-research';
  // If we have an expanded signal, new input is evidence for it
  if (expandedCoworkItem?.type === 'signal') return 'evidence';
  // If we have an expanded KQ, new input is answer contribution
  if (expandedCoworkItem?.type === 'kq') return 'kq-evidence';

  // Questions ABOUT signals/KQs → chat (not signal/kq creation)
  // "有什么信号" "信号是什么" "什么关键问题" are questions, not new observations
  if (/有什么|是什么|怎么样|哪些|what|how|any|最近/i.test(text)) return 'chat';

  // Signal indicators: user is REPORTING a new observation (assertive, not interrogative)
  if (/我发现|我注意到|我观察到|我听说|podcast.*提到|报道称|GitHub.*commit|刚发布|刚上线|announced|launched|hired/i.test(text)) return 'signal';
  // KQ indicators: user is PROPOSING a hypothesis to track
  if (/我想验证|假设是|核心问题是|关键假设|key question|需要追踪/i.test(text)) return 'kq';
  return 'chat';
}

// ===== URL Analysis Handler =====
function handleURLInput(text, friend, company) {
  const urlMatch = text.match(/https?:\/\/\S+/i);
  const url = urlMatch ? urlMatch[0] : '';
  const domain = url ? new URL(url).hostname.replace('www.', '') : '';

  // Classify URL domain
  let sourceType = 'S2';
  let signalType = '公开信息';
  if (/x\.com|twitter\.com/i.test(domain)) { sourceType = 'S3'; signalType = 'Exec Voice / 社交媒体'; }
  else if (/linkedin\.com/i.test(domain)) { sourceType = 'S4'; signalType = '人才信号'; }
  else if (/glassdoor/i.test(domain)) { sourceType = 'S3'; signalType = '员工情绪'; }
  else if (/sec\.gov|ir\./i.test(domain)) { sourceType = 'S5'; signalType = '官方文件'; }
  else if (/github\.com/i.test(domain)) { sourceType = 'S5'; signalType = '代码/产品信号'; }

  // Auto-detect company from text
  const targetCompany = company || extractCompanyFromText(text, friend);

  // Show "analyzing" message
  addToTimeline(selectedResearch, {
    type: 'chat', role: 'ai', company: targetCompany,
    text: `🔗 正在分析链接...\n\n<div style="padding:8px 12px;background:var(--bg);border-radius:8px;margin:4px 0;">
      <div style="font-size:11px;color:var(--text-tertiary);">${domain}</div>
      <div style="font-size:12px;word-break:break-all;">${url}</div>
      <div style="font-size:11px;margin-top:4px;"><span style="padding:2px 6px;background:#f0f4ff;border-radius:8px;color:#3b5998;">${sourceType} ${SOURCE_CREDIBILITY[sourceType]?.label || ''}</span> · ${signalType}</div>
    </div>`
  });

  // Generate Layer 2 analysis if company is known
  if (targetCompany && friend) {
    const layer2 = generateLayer2Analysis(friend, targetCompany);
    if (layer2) {
      addToTimeline(selectedResearch, {
        type: 'chat', role: 'ai', company: targetCompany,
        text: renderLayer2Table(layer2, friend, targetCompany),
      });
    }
  } else if (!targetCompany) {
    addToTimeline(selectedResearch, {
      type: 'chat', role: 'ai',
      text: `这个链接涉及哪家公司？请告诉我公司名，我可以帮你做 Winner Pattern 分析。`,
    });
  }
}

function extractCompanyFromText(text, friend) {
  const candidates = CANDIDATE_SCORES[friend];
  if (!candidates) return null;
  for (const name of Object.keys(candidates)) {
    if (text.toLowerCase().includes(name.toLowerCase())) return name;
  }
  // Check across all researches
  for (const [f, cs] of Object.entries(CANDIDATE_SCORES)) {
    for (const name of Object.keys(cs)) {
      if (text.toLowerCase().includes(name.toLowerCase())) return name;
    }
  }
  return null;
}

// ===== Cross-Research Query Handler =====
function handleCrossResearchQuery(text) {
  // Extract company name from text
  const companyName = extractAnyCompanyName(text);
  if (!companyName) {
    addToTimeline(selectedResearch, {
      type: 'chat', role: 'ai',
      text: `我需要知道你想查哪家公司。请说 "xxx最像谁" 或 "xxx在哪个研究里"。`,
    });
    return;
  }

  const results = [];
  for (const [friend, leagueData] of Object.entries(LEAGUE_TABLE_DATA)) {
    const entry = leagueData.find(d => d.company.toLowerCase() === companyName.toLowerCase());
    if (entry) {
      const rank = leagueData.indexOf(entry) + 1;
      const scoreResult = computeAlikeScore(friend, entry.company);
      results.push({ friend, company: entry.company, rank, total: leagueData.length, score: entry.alikeScore || scoreResult?.alikeScore || 0, breakdown: scoreResult?.breakdown });
    }
  }

  if (results.length === 0) {
    addToTimeline(selectedResearch, {
      type: 'chat', role: 'ai',
      text: `<strong>${companyName}</strong> 目前不在任何一个研究的 League Table 上。\n\n可以在主界面发起 "Who is the next {Old Friend}?" 研究来评估它。`,
    });
    return;
  }

  let html = `<strong>${companyName}</strong> 在以下研究中出现：\n\n`;
  results.forEach(r => {
    const scoreColor = r.score >= 80 ? '#16a34a' : r.score >= 60 ? '#d97706' : '#ef4444';
    html += `<div style="padding:10px 14px;margin:6px 0;background:var(--bg-white);border:1px solid var(--border-light);border-radius:var(--radius-sm);">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:14px;font-weight:600;">Who is the next ${r.friend}</span>
        <span style="font-size:12px;color:var(--text-tertiary);">排名 #${r.rank}/${r.total}</span>
        <span style="font-size:14px;font-weight:700;color:${scoreColor};margin-left:auto;">${r.score}</span>
      </div>`;
    // Show top 3 dimensions
    if (r.breakdown) {
      const topDims = r.breakdown.sort((a, b) => b.contribution - a.contribution).slice(0, 3);
      html += `<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">`;
      topDims.forEach(d => {
        const pct = Math.round(d.matchRate * 100);
        html += `<span style="font-size:11px;padding:2px 8px;background:var(--bg);border-radius:8px;">${d.dim}(${DIMENSIONS[d.dim]?.short||d.dim}) ${pct}%</span>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  addToTimeline(selectedResearch, { type: 'chat', role: 'ai', text: html });
}

function extractAnyCompanyName(text) {
  // Search across all researches for known company names
  for (const [friend, candidates] of Object.entries(CANDIDATE_SCORES)) {
    for (const name of Object.keys(candidates)) {
      if (text.toLowerCase().includes(name.toLowerCase())) return name;
    }
  }
  // Try to extract from "xxx最像谁" pattern
  const match = text.match(/(.+?)(?:最像谁|像谁|在哪|排第几)/);
  if (match) {
    const candidate = match[1].trim();
    // Check if it's a known company
    for (const [friend, candidates] of Object.entries(CANDIDATE_SCORES)) {
      for (const name of Object.keys(candidates)) {
        if (name.toLowerCase().includes(candidate.toLowerCase()) || candidate.toLowerCase().includes(name.toLowerCase())) return name;
      }
    }
    return candidate; // Return raw text as potential company name
  }
  return null;
}

function generateLayer2Analysis(friend, company) {
  // Check pre-built first
  if (LAYER2_ANALYSIS[friend]?.[company]) return LAYER2_ANALYSIS[friend][company];

  // Generate generic from dimension scores
  const candidate = CANDIDATE_SCORES[friend]?.[company];
  const pattern = WINNER_PATTERNS[friend];
  if (!candidate || !pattern) return null;

  const dims = Object.keys(DIMENSIONS);
  const rows = dims.map(d => {
    const baseline = pattern.baselines[d];
    const score = candidate[d] || 0;
    const matchRate = score / baseline.score;
    return {
      fn: DIMENSIONS[d]?.short || d,
      need: baseline.evidence?.slice(0, 40) || `${friend}基准${baseline.score}/5`,
      doing: candidate.evidence?.[d]?.slice(0, 40) || `候选分 ${score}/5`,
      match: matchRate >= 0.8 ? 'check' : matchRate >= 0.6 ? 'warning' : 'cross',
    };
  });

  return { rows, summary: `${company} 对标 ${friend} 的通用分析。建议补充具体业务环节的定性研究。` };
}

// Simple markdown→HTML: headers, bold, italic, lists, code blocks, links
function renderMarkdown(text) {
  if (!text) return '';
  // Pre-process: collapse ALL unnecessary blank lines
  let processed = text
    // Between list items (unordered)
    .replace(/(^[-•·] .+$)\n\n([-•·] )/gm, '$1\n$2')
    // Between list items (ordered)
    .replace(/(^\d+\. .+$)\n\n(\d+\. )/gm, '$1\n$2')
    // Between a heading/bold line and the next line
    .replace(/(^#{1,3} .+$|^\*\*.+\*\*.*$)\n\n/gm, '$1\n')
    // Between a regular line and a list item
    .replace(/([^\n])\n\n([-•·] )/gm, '$1\n$2')
    .replace(/([^\n])\n\n(\d+\. )/gm, '$1\n$2')
    // Between a list item and a heading/bold
    .replace(/(^[-•·] .+$)\n\n(#{1,3} |\*\*)/gm, '$1\n$2')
    .replace(/(^\d+\. .+$)\n\n(#{1,3} |\*\*)/gm, '$1\n$2');
  let html = processed
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre style="background:var(--bg);padding:8px 12px;border-radius:6px;font-size:12px;overflow-x:auto;margin:6px 0;"><code>$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:1px 4px;border-radius:3px;font-size:12px;">$1</code>')
    // Headers
    .replace(/^### (.+)$/gm, '<div style="font-size:13px;font-weight:700;margin:10px 0 4px;">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-size:14px;font-weight:700;margin:12px 0 4px;">$1</div>')
    .replace(/^# (.+)$/gm, '<div style="font-size:15px;font-weight:700;margin:14px 0 4px;">$1</div>')
    // Bold + italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Horizontal rules
    .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border-light);margin:8px 0;">')
    // Unordered lists
    .replace(/^[-•·] (.+)$/gm, '<div style="padding:1px 0 1px 12px;position:relative;"><span style="position:absolute;left:0;">·</span>$1</div>')
    // Ordered lists
    .replace(/^(\d+)\. (.+)$/gm, '<div style="padding:1px 0 1px 20px;position:relative;"><span style="position:absolute;left:0;color:var(--text-tertiary);">$1.</span>$2</div>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#3b5998;text-decoration:underline;">$1</a>')
    // Paragraphs: no extra spacing, just line breaks
    .replace(/\n\n/g, '<br>')
    .replace(/\n/g, '<br>');
  return html;
}

function handleChatInput(text, friend, company) {
  // Auto-detect company from text if not set
  const candidates = CANDIDATE_SCORES[friend];
  if (!company && candidates) {
    company = extractCompanyFromText(text, friend);
  }

  // Show streaming loading
  const streamMsg = addToTimeline(selectedResearch, {
    type: 'chat', role: 'ai', company,
    text: `<div class="cowork-loading">🔄 AI 正在思考...</div>`,
  });
  renderCoworkTab();

  // Build FULL conversation history as project memory
  // Every item in the timeline becomes context — chats, signals, KQs
  const tl = getTimeline(selectedResearch, company);
  const history = [];
  const projectMemory = []; // Structured summary of all past interactions

  const stripHtml = s => (s || '').replace(/<[^>]*>/g, '');

  // Include ALL signals for this company as context (not just ones in timeline)
  if (company && friend) {
    const allProposals = getProposalsForCompany(friend, company);
    allProposals.forEach(p => {
      let sigMem = `[Signal] ${stripHtml(p.signal)} (置信度:${p.confidence}%, 维度:${Object.keys(p.dims).join(',')}, 来源:${p.source || ''})`;
      if (p.triangulate) {
        const tri = p.triangulate;
        if (tri.evidence?.points) sigMem += `\n  Evidence Validation(${tri.evidence.pass?'PASS':'FAIL'}): ${tri.evidence.points.map(stripHtml).join('; ')}`;
        if (tri.evidence?.missing?.length) sigMem += `\n  缺失证据: ${tri.evidence.missing.join('; ')}`;
        if (tri.pattern?.points) sigMem += `\n  Pattern Matching(${tri.pattern.match?'MATCH':'PARTIAL'}): ${tri.pattern.points.map(stripHtml).join('; ')}`;
        if (tri.adversarial?.points?.length) sigMem += `\n  Adversarial(${tri.adversarial.holes}个漏洞): ${tri.adversarial.points.map(stripHtml).join('; ')}`;
      }
      if (p.evidences?.length) {
        sigMem += `\n  证据: ${p.evidences.map(e => stripHtml(e.text).slice(0,100)).join('; ')}`;
      }
      projectMemory.push(sigMem);
    });
    // Include all KQs for this company
    const statusData = COMPANY_STATUS[friend]?.[company];
    (statusData?.keyQuestions || []).forEach(kq => {
      const answer = kq.evolvingAnswer || kq.answer?.title || kq.evolving_answer || '';
      projectMemory.push(`[KQ] ${kq.question} → ${stripHtml(answer).slice(0, 300)}`);
    });
  }

  // Timeline chat history
  tl.forEach(m => {
    if (m.id === streamMsg.id) return;
    if (m.type === 'chat' && m.text && !m.text.includes('cowork-loading')) {
      const cleanText = stripHtml(m.rawText || m.text).slice(0, 800);
      if (cleanText.trim()) {
        history.push({ role: m.role === 'ai' ? 'assistant' : 'user', content: cleanText });
      }
    }
  });

  // Trim history to fit context window (keep last 20 turns)
  const trimmedHistory = history.slice(-20);

  // Build candidates context for General mode
  let candidatesInfo = '';
  if (!company && LEAGUE_TABLE_DATA[friend]) {
    candidatesInfo = LEAGUE_TABLE_DATA[friend].slice(0, 10).map((d, i) =>
      `#${i+1} ${d.company} (${d.alikeScore})`
    ).join(', ');
  }

  // DEV MODE: submit to pending file → Claude Code processes → injectCowork
  const DEV_MODE = false; // Production mode
  if (DEV_MODE) {
    // Submit to api.py pending endpoint for Claude Code to pick up
    fetch(COWORK_API + '/api/cowork/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text, company: company || '', friend,
        history: history.slice(-10).map(h => `${h.role}: ${h.content}`),
      }),
    }).then(() => {
      streamMsg.text = `<div class="cowork-loading">⏳ Claude Code 处理中...</div>`;
      renderCoworkTab(true);
    }).catch(() => {
      // Fallback to local if api.py not running
      const localResp = handleChatInputLocal(text, friend, company);
      streamMsg.text = renderMarkdown(localResp);
      streamMsg.rawText = localResp;
      streamMsg.sources = ['Vault Data (Local)'];
      renderCoworkTab(true);
      persistAll();
    });
    return;
  }

  coworkApiStream('/api/cowork/chat', {
    company: company || '', message: text, friend,
    candidates: candidatesInfo,
    history: trimmedHistory,
    projectMemory: projectMemory.join('\n'),
  }, (chunk, fullText) => {
    streamMsg.text = renderMarkdown(fullText);
    renderCoworkTab(true);
  }, (finalText, error) => {
    if (error) {
      streamMsg.text = handleChatInputLocal(text, friend, company);
    } else {
      streamMsg.text = renderMarkdown(finalText);
      streamMsg.rawText = finalText;
      streamMsg.sources = ['Claude Opus 4'];
    }
    // Auto-trigger signal/KQ cards if user mentioned them
    if (company && friend) autoTriggerCards(text, friend, company);
    renderCoworkTab(true);
    persistAll();
  });
}

// Local fallback for chat when API unavailable
function handleChatInputLocal(text, friend, company) {
  const lowerText = text.toLowerCase();
  const candidates = CANDIDATE_SCORES[friend];
  const proposals = company ? (DELTA_PROPOSALS[friend]?.[company] || []) : [];
  const statuses = company ? COMPANY_STATUS[friend]?.[company] : null;
  const artifacts = statuses?.artifacts || {};

  // Smart local response based on user intent
  if (!company) {
    // General mode — check if asking about rankings or comparisons
    if (LEAGUE_TABLE_DATA[friend]) {
      const top5 = LEAGUE_TABLE_DATA[friend].slice(0, 5);
      return `**${friend} League Table Top 5：**\n\n` +
        top5.map((d, i) => `${i+1}. **${d.company}** — Alike Score ${d.alikeScore}`).join('\n') +
        `\n\n点击任一公司pill深入研究，或问我具体的对标问题。`;
    }
    return `请选择一家公司开始研究。`;
  }

  // Company-specific — try to answer from vault data
  const alikeResult = computeAlikeScore(friend, company);
  const score = alikeResult?.alikeScore?.toFixed(1) || '?';

  // Check for signal-related questions
  if (lowerText.includes('信号') || lowerText.includes('signal') || lowerText.includes('最近')) {
    if (proposals.length === 0) return `${company}目前没有活跃信号。可以通过分享链接、访谈内容或观察来触发信号分析。`;
    let resp = `**${company} 当前信号（${proposals.length}条）：**\n\n`;
    proposals.forEach((p, i) => {
      resp += `${i+1}. **${p.signal.slice(0, 80)}**\n   置信度：${p.confidence}% · 维度：${Object.keys(p.dims).join('+')} · 状态：${p.autoStatus === 'auto-applied' ? '已生效' : '待验证'}\n\n`;
    });
    return resp;
  }

  // Check for KQ-related questions
  if (lowerText.includes('问题') || lowerText.includes('kq') || lowerText.includes('question')) {
    const kqs = statuses?.keyQuestions || [];
    if (kqs.length === 0) return `${company}目前没有关键问题。`;
    let resp = `**${company} 关键问题（${kqs.length}条）：**\n\n`;
    kqs.forEach((kq, i) => {
      const answer = kq.evolvingAnswer || kq.answer?.title || '待分析';
      resp += `${i+1}. **${kq.question}**\n   ${answer.slice(0, 120)}...\n\n`;
    });
    return resp;
  }

  // Check for artifact-related questions (CEO, org, etc.)
  const artifactKeywords = {
    'ceo-profile': ['ceo', '创始人', '认知', 'luis', 'von ahn'],
    'org-xray': ['组织', 'org', '穿透', 'd1', 'd2', 'd3', 'd4', 'd5', 'd6', 'd7'],
    'org-inflection': ['组织变革', '组织转折', 'inflection'],
    'biz-inflection': ['业务', '增长', '财务', '品类', '战略'],
    'alike-memo': ['像', 'alike', '对标', '相似'],
    'red-team': ['风险', 'bear', 'red team', '不该投'],
    'investment-memo': ['投资', 'memo', '备忘', '总结'],
    'kq-tracker': ['追踪', 'tracker'],
  };

  for (const [artType, keywords] of Object.entries(artifactKeywords)) {
    if (keywords.some(kw => lowerText.includes(kw))) {
      const docs = artifacts[artType];
      if (docs?.length > 0 && docs[0].content) {
        // Return first 800 chars of the matching artifact
        const content = docs[0].content;
        return content.length > 1200 ? content.slice(0, 1200) + '\n\n*（文档较长，完整内容请在Status→研究议程中查看）*' : content;
      }
    }
  }

  // Default: return company overview from available data
  let resp = `**${company}** · Alike Score: ${score} · Rank #${(LEAGUE_TABLE_DATA[friend]?.findIndex(d => d.company === company) ?? -1) + 1}\n\n`;
  resp += `**活跃信号**：${proposals.filter(p => p.autoStatus !== 'auto-applied').length}条待验证 · ${proposals.filter(p => p.autoStatus === 'auto-applied').length}条已生效\n`;
  resp += `**关键问题**：${statuses?.keyQuestions?.length || 0}条\n`;
  resp += `**研究文档**：${Object.keys(artifacts).filter(k => artifacts[k]?.length > 0).length}/${ARTIFACT_TYPES.length}个已生成\n\n`;
  resp += `你可以问我：\n- ${company}最近有什么信号？\n- ${company}的CEO怎么样？\n- ${company}的组织穿透分析\n- ${company}有什么风险？`;
  return resp;
}

function handleSignalInput(text, friend, company) {
  const targetCompany = company || extractCompanyFromText(text, friend);
  if (!targetCompany) {
    addToTimeline(selectedResearch, { type: 'chat', role: 'ai', text: '这个信号关于哪家公司？请指定公司名。', company });

  }

  });

  coworkApiCall('/api/cowork/signal-analyze', {
    company: targetCompany, signal_text: text, friend,
  }).then(result => {
    // Remove loading message
    const tl = getTimeline(selectedResearch, targetCompany);
    const idx = tl.findIndex(m => m.id === loadingMsg.id);
    if (idx >= 0) tl.splice(idx, 1);

    if (result.ok && result.data) {

      if (!DELTA_PROPOSALS[friend][targetCompany]) DELTA_PROPOSALS[friend][targetCompany] = [];

      const proposal = {
        id: proposalId, dims: data.dimension_deltas || { D1: 0.3 }, signal: text,
        confidence: data.confidence || 50, source: 'AI analysis + Human observation',
        status: 'proposed', autoStatus: data.confidence >= 80 ? 'auto-applied' : 'signal-only',
        evidenceLevel: 2, bestSource: data.source_classification || 'S3',
        company: targetCompany, agentVotes: [], humanInputs: [{ text, timestamp: Date.now() }],
        evidences: [{ text, sourceType: data.source_classification || 'S3', dims: data.dimensions || ['D1'], addedBy: 'human' }],
        triangulate: data.triangulate || null,
        createdAt: Date.now(), updatedAt: Date.now(),
      };
      DELTA_PROPOSALS[friend][targetCompany].push(proposal);

      // Apply score changes
      const candidate = CANDIDATE_SCORES[friend]?.[targetCompany];
      if (candidate && data.dimension_deltas) {
        Object.entries(data.dimension_deltas).forEach(([d, delta]) => {
          if (candidate[d] !== undefined) candidate[d] = Math.min(5, candidate[d] + delta);
        });
      }

      // Add signal card
      addToTimeline(selectedResearch, {
        type: 'signal', role: 'ai', signalId: proposalId, company: targetCompany,
        summary: data.summary || text,
        dims: (data.dimensions || ['D1']).join('+'),
        confidence: data.confidence || 50,
      });

      // If AI returned a key question, add it
      if (data.key_question) {
        addToTimeline(selectedResearch, {
          type: 'chat', role: 'ai', company: targetCompany,
          text: `<strong>🔑 关键问题</strong>：${data.key_question}`,
        });
      }

      checkAutoDecision(proposal, friend, targetCompany);
      LEAGUE_TABLE_DATA[friend] = buildLeagueTable(friend);
      expandedCoworkItem = { type: 'signal', id: proposalId };
    } else {
      // Fallback to local analysis
      handleSignalInputLocal(text, friend, targetCompany);
    }
    // Invalidate dim analysis cache for this company (scores changed)
    Object.keys(DIM_ANALYSIS_CACHE).forEach(k => {
      if (k.includes(targetCompany)) delete DIM_ANALYSIS_CACHE[k];
    });

    renderCoworkTab();
    persistAll();
  });
}

// Regenerate triangulate analysis text based on current evidence
function regenerateTriangulate(proposal, friend, company) {
  const evidences = proposal.evidences || [];
  const pattern = WINNER_PATTERNS[friend];
  const scores = CANDIDATE_SCORES[friend]?.[company];
  const dims = Object.keys(proposal.dims || {});

  // Evidence Validation — structured format
  const sourcePoints = evidences.map(e => {
    const src = SOURCE_CREDIBILITY[e.sourceType];
    return `${e.addedBy === 'human' ? '👤' : '🤖'} ${src?.label || e.sourceType}：${e.text.slice(0, 100)}`;
  });
  const uniqueSourceTypes = new Set(evidences.map(e => e.sourceType));
  const uniqueDims = new Set(evidences.flatMap(e => e.dims));
  const multiSource = uniqueSourceTypes.size >= 2;
  const multiDim = uniqueDims.size >= 2;
  const hasS5 = evidences.some(e => e.sourceType === 'S5');
  const hasS4 = evidences.some(e => e.sourceType === 'S4');
  const hasHuman = evidences.some(e => e.addedBy === 'human');
  const ePass = hasS5 || hasS4 || (multiSource && multiDim);
  const eLevelLabel = (multiDim && multiSource) ? 'E4 多维多源' :
                      multiDim ? 'E3 多维单源' :
                      multiSource ? 'E2 单维多源' : 'E1 单维单源';
  sourcePoints.push(`→ ${eLevelLabel}（${evidences.length}条证据，${uniqueSourceTypes.size}类信源，${uniqueDims.size}个维度）`);
  const missingEvidence = [];
  if (!hasS5 && !hasS4) missingEvidence.push('缺客观事实类信源（S4-S5）');
  if (!multiSource) missingEvidence.push('仅单一信源类型，需独立信源交叉验证');
  if (!hasHuman) missingEvidence.push('暂无一手信息补充');

  // Pattern Matching — structured format
  const dimNames = dims.map(d => DIMENSIONS[d]?.short || d).join('+');
  const patternPoints = [];
  let patternMatch = false;
  dims.forEach(d => {
    const baseline = pattern?.baselines?.[d];
    const candidateScore = scores?.[d];
    if (baseline) {
      const matchPct = candidateScore / baseline.score;
      patternPoints.push(`${d}(${DIMENSIONS[d]?.short||d}): 候选${candidateScore}/5 vs ${friend}基准${baseline.score}/5 = ${Math.round(matchPct*100)}%匹配`);
      if (matchPct >= 0.7) patternMatch = true;
    }
  });
  if (patternPoints.length === 0) patternPoints.push(`信号涉及 ${dimNames}，对标 ${friend} Winner Pattern`);

  // Adversarial — structured format
  const adversarialPoints = [];
  let holes = 0;
  if (!multiSource) { adversarialPoints.push('单一信源风险：信号可能被误读或夸大'); holes++; }
  if (evidences.length <= 1) { adversarialPoints.push('证据单薄：仅1条证据，缺乏交叉验证'); holes++; }
  if (!ePass) { adversarialPoints.push('信源等级不足：最高信源未达S4，解读可能偏主观'); holes++; }
  if (hasHuman && !hasS5) { adversarialPoints.push('一手信息已有但需客观数据验证（产品数据/财报）'); }
  if (multiSource && ePass) { adversarialPoints.push('多源交叉验证已通过，主要风险在执行层面而非信号真实性'); }
  if (adversarialPoints.length === 0) adversarialPoints.push('暂无明显漏洞，但需持续监控');

  return {
    evidence: { pass: ePass, points: sourcePoints, missing: missingEvidence },
    pattern: { match: patternMatch, points: patternPoints },
    adversarial: { holes, points: adversarialPoints },
  };
}

function handleKQEvidenceInput(text, friend, company, kqId) {
  const kq = findKQById(friend, kqId);
  if (!kq) { handleChatInput(text, friend, company); return; }

  // --- First: is user ASKING about the KQ (not providing evidence)? ---
  const isQuestion = /是什么|什么意思|为什么|怎么|吗[？?]?\s*$|具体是|详细|解释一下|展开说|啥意思|how|what|why|explain|mean|\?\s*$|？\s*$/i.test(text);
  if (isQuestion) {
    handleChatInput(text, friend, company);
    return;
  }

  // --- Source clarification for KQ too ---
  const hasSource = /聊过|访谈|看到|报道|官网|GitHub|SEC|财报|数据|确认|podcast|LinkedIn|Twitter|文章|论文|招聘|发布|上线|CEO.*说|VP.*说|CTO.*说|founder.*说|管理层.*说/i.test(text);
  if (!hasSource && !/直觉|推测|感觉|我觉得/i.test(text)) {
    addToTimeline(selectedResearch, {
      type: 'chat', role: 'ai',
      text: `这个信息的来源是什么？\n\n` +
        `· <strong>亲自验证的</strong>（产品体验/数据截图）→ 高权重\n` +
        `· <strong>和相关人士聊的</strong>（管理层/员工/专家）→ 中权重\n` +
        `· <strong>看到的报道</strong>（文章/社交媒体）→ 低权重\n` +
        `· <strong>直觉</strong> → 记录为待验证观点`,
    });
    kq._pendingInput = text;
    renderCoworkTab();
    return;
  }
  delete kq._pendingInput;

  // Update evolving answer with new info
  const prevAnswer = kq.evolvingAnswer || (kq.answer?.title) || '';
  const sourceType = classifySource(text);
  const srcInfo = SOURCE_CREDIBILITY[sourceType];

  // Add to sources
  const newSource = typeof srcInfo === 'object' ? srcInfo.label : sourceType;
  if (!kq.sources) kq.sources = [];
  kq.sources.push({ name: `Human: ${newSource}`, type: sourceType });

  // Append to evidence_trail
  if (!kq.evidence_trail) kq.evidence_trail = [];
  kq.evidence_trail.push({
    date: new Date().toISOString().slice(0, 10),
    source: 'human',
    content: text.slice(0, 500),
    impact: /不好|下降|恶化|风险|差|问题|negative/i.test(text) ? 'negative' : /好|增长|提升|改善|positive|确认/i.test(text) ? 'positive' : 'neutral',
  });

  // Evolve the answer
  kq.evolvingAnswer = prevAnswer + (prevAnswer ? '\n\n' : '') +
    `[${newSource}] ${text.slice(0, 200)}`;
  if (kq.answer) kq.answer.title = kq.evolvingAnswer;
  kq.author = 'ai+human';

  addToTimeline(selectedResearch, {
    type: 'chat', role: 'ai',
    text: `📎 已更新 Key Question 的答案\n\n新信息来源：<strong>${newSource}</strong>`,
    sources: [newSource],
  });

  // --- KQ → Signal linkage: check if answering this KQ unblocks a Signal ---
  const proposals = DELTA_PROPOSALS[friend]?.[company] || [];
  let unblocked = false;
  proposals.forEach(proposal => {
    if (proposal.autoStatus === 'auto-applied') return; // already applied
    // Check if this KQ's topic relates to the signal
    const kqText = (kq.question || '').toLowerCase();
    const sigText = (proposal.signal || '').toLowerCase();
    const sigDims = Object.keys(proposal.dims || {});
    const kqDims = classifyDimensions(kqText);
    const dimOverlap = sigDims.some(d => kqDims.includes(d));
    const textOverlap = sigText.split(/\s+/).some(w => w.length > 2 && kqText.includes(w));

    if (dimOverlap || textOverlap) {
      // Inject KQ answer as new evidence into the signal
      proposal.evidences.push({
        text: `KQ回答：${text.slice(0, 150)}`,
        sourceType,
        dims: kqDims.length > 0 ? kqDims : sigDims,
        addedBy: 'human-via-kq',
      });

      const prevConf = proposal.confidence;
      checkAutoDecision(proposal, friend, company);

      if (proposal.confidence > prevConf) {
        unblocked = true;
        addToTimeline(selectedResearch, {
          type: 'synthesis', role: 'synthesis',
          body: `🔗 KQ 回答联动 Signal "<strong>${proposal.signal.slice(0, 40)}...</strong>"\n` +
            `置信度 ${prevConf}% → <strong>${proposal.confidence}%</strong>` +
            (proposal.autoStatus === 'auto-applied' ? ` · ✅ Delta 已自动生效！` : ''),
          totalConfidence: proposal.confidence,
        });
      }
    }
  });

  if (unblocked) {
    LEAGUE_TABLE_DATA[friend] = buildLeagueTable(friend);
  }
}

function extractCompanyFromText(text, friend, fallbackToFirst) {
  const candidates = CANDIDATE_SCORES[friend];
  if (!candidates) return null;
  for (const name of Object.keys(candidates)) {
    if (text.toLowerCase().includes(name.toLowerCase())) return name;
  }
  return fallbackToFirst ? Object.keys(candidates)[0] : null;
}

function generateKQAnswer(question, company, friend) {
  const scores = CANDIDATE_SCORES[friend]?.[company];
  const pattern = WINNER_PATTERNS[friend];
  if (!scores || !pattern) return { text: '暂无足够数据回答此问题', sources: ['N/A'] };

  if (/递归|recursive|自进化/i.test(question)) {
    return {

function renderForkUI(msg) {
  const agents = msg.suggestedAgents || [];
  const scores = window._lastAgentScores || {};
  // Sort agents: selected first (by score desc), then unselected (by score desc)
  const sortedAgents = [...AGENTS].sort((a, b) => {
    const aSelected = agents.includes(a.id) ? 1 : 0;
    const bSelected = agents.includes(b.id) ? 1 : 0;
    if (aSelected !== bSelected) return bSelected - aSelected;
    return (scores[b.id] || 1) - (scores[a.id] || 1);
  });

  return `
    <div class="cowork-fork">
      <div class="cowork-fork-top">
        <span class="cowork-fork-label">${msg.mode === 'divergent' ? '🌿 Divergent' : '🎯 Convergent'}</span>
        ${!msg.launched ? `<button class="cowork-fork-go" onclick="launchAgents('${msg.id}')">Launch</button>` : ''}
      </div>
      <div class="cowork-fork-agents" id="forkAgents_${msg.id}">
        ${sortedAgents.map(a => {
          const score = Math.round(scores[a.id] || 1);
          const relDots = [1,2,3].map(i => `<span class="rel-bar b${i} ${i <= score ? 'filled' : ''}"></span>`).join('');
          return `
            <div class="cowork-fork-agent ${agents.includes(a.id) ? 'selected' : ''}"
                 onclick="toggleForkAgent('${msg.id}','${a.id}',this)" data-agent="${a.id}">
              <span class="agent-emoji">${a.emoji}</span><span>${a.name}</span><span class="agent-rel">${relDots}</span>
            </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function scrollToAgent(carouselId, idx) {
  const carousel = document.getElementById(carouselId);

  if (cards[idx]) {
    cards[idx].scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });

function updateCarouselNav(carouselId) {
  const carousel = document.getElementById(carouselId);
  const nav = document.getElementById('nav_' + carouselId);
  if (!carousel || !nav) return;
  const cards = carousel.querySelectorAll('.cowork-agent-card');
  const scrollLeft = carousel.scrollLeft;
  const cardWidth = cards[0] ? cards[0].offsetWidth + 10 : 1;
  const activeIdx = Math.round(scrollLeft / cardWidth);
  nav.querySelectorAll('.cowork-agents-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === activeIdx);
  });

function launchAgents(msgId) {
  const research = RESEARCHES.find(r => r.id === selectedResearch);
  if (!research) return;
  const msgs = coworkHistory[selectedResearch] || [];

  // Find the fork message and mark as launched
  const forkMsg = msgs.find(m => m.id === msgId);
  if (forkMsg) forkMsg.launched = true;

  // Get selected agents from DOM
  const container = document.getElementById(`forkAgents_${msgId}`);
  const selected = container ? [...container.querySelectorAll('.cowork-fork-agent.selected')].map(el => el.dataset.agent) : [];
  if (selected.length === 0) { alert('Select at least one agent'); return; }

  // Generate mock agent outputs
  const company = coworkCompany || research.friend;
  const mode = forkMsg ? forkMsg.mode : 'divergent';
  const spark = forkMsg ? forkMsg.spark : '';

  const agentOutputs = selected.map(id => generateAgentOutput(id, company, research.friend, mode, spark));
  const agentsMsg = { type: 'agents', id: 'ao_' + Date.now(), agents: agentOutputs };
  msgs.push(agentsMsg);

  // Generate collision report
  if (selected.length >= 2) {
    const collisionMsg = generateCollision(agentOutputs, company, mode, research.friend);
    msgs.push(collisionMsg);
  }

  renderCoworkTab();
}
